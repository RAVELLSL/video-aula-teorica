<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Aprendizagem Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Variáveis Sci-Fi & Cyberpunk --- */
        :root {
            /* Tema Claro (Corporate Sci-Fi) - Padrão */
            --primary-color: #0055FF; /* Electric Blue */
            --primary-light: rgba(0, 85, 255, 0.08);
            --secondary-color: #7000FF; /* Deep Tech Purple */
            --bg-body: #F0F4F8; /* Gelo Metálico */
            --bg-surface: rgba(255, 255, 255, 0.85); /* Translúcido para Glassmorphism */
            --bg-card: #FFFFFF;
            --text-main: #0B132B;
            --text-muted: #5C6B8A;
            --border-color: rgba(0, 85, 255, 0.15);
            --border-hover: rgba(0, 85, 255, 0.5);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            
            /* Sombras e Brilhos Tema Claro */
            --shadow-sm: 0 4px 15px rgba(0, 30, 80, 0.05);
            --shadow-md: 0 10px 30px rgba(0, 30, 80, 0.08);
            --glow-primary: 0 0 15px rgba(0, 85, 255, 0.15);
            --glow-text: none;
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Tema Escuro (Neon Cyberpunk) */
        [data-theme="dark"] {
            --primary-color: #00F0FF; /* Neon Cyan */
            --primary-light: rgba(0, 240, 255, 0.1);
            --secondary-color: #B026FF; /* Holo Purple */
            --bg-body: #050508; /* Dark Abyss */
            --bg-surface: rgba(13, 17, 26, 0.8); /* Deep Tech Blue/Black */
            --bg-card: #0D111A;
            --text-main: #E2E8F0;
            --text-muted: #8B949E;
            --border-color: rgba(0, 240, 255, 0.15);
            --border-hover: rgba(0, 240, 255, 0.6);
            --sidebar-bg: rgba(10, 12, 18, 0.95);
            
            /* Sombras e Brilhos Neon */
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.8);
            --glow-primary: 0 0 20px rgba(0, 240, 255, 0.25), inset 0 0 10px rgba(0, 240, 255, 0.05);
            --glow-text: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center center;
        }

        /* --- Layout e Estrutura Principal --- */
        .app-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            flex-direction: row; /* Padrão para Desktop */
        }

        /* --- Sidebar Futurista (Glassmorphism) --- */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 50;
            transition: var(--transition);
        }

        .brand {
            padding: 2.5rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .brand i {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            filter: drop-shadow(var(--glow-text));
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-menu {
            padding: 1.5rem 1rem;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-track { background: transparent; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            line-height: 1.4;
            position: relative;
        }

        .nav-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            margin-top: 0.15rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .nav-item span {
            flex-grow: 1;
        }

        .nav-item:hover {
            background-color: var(--primary-light);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-color: var(--border-hover);
            box-shadow: var(--glow-primary);
        }

        .nav-item.active i {
            text-shadow: var(--glow-text);
        }

        /* --- Conteúdo Principal --- */
        .main-wrapper {
            margin-left: 320px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 320px);
        }

        /* Top Bar Translúcida */
        .top-bar {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            background-color: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .search-container {
            flex-grow: 1;
            max-width: 600px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-toggle {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
            transform: rotate(15deg) scale(1.05);
        }

        .main-content {
            padding: 3rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- Painel da Fase --- */
        .phase-hero {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 3rem;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-color);
            animation: fadeInDown 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .phase-hero::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 150px; height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary-light));
            transform: skewX(-45deg) translateX(50px);
            opacity: 0.5;
        }

        .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-light);
            color: var(--primary-color);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-color);
        }

        .phase-hero h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.2;
            letter-spacing: -1px;
            text-shadow: var(--glow-text);
        }

        .phase-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 900px;
            position: relative;
            z-index: 2;
        }

        /* --- Grid de Módulos (Cards Tech) --- */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.5rem;
        }

        .module-card {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
        }

        .module-card:hover {
            box-shadow: var(--glow-primary);
            transform: translateY(-5px);
            border-color: var(--border-hover);
        }

        .module-header {
            padding: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom right, var(--bg-surface), transparent);
        }

        .module-context {
            font-size: 0.75rem;
            color: var(--secondary-color);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            display: block;
            letter-spacing: 1px;
        }

        .module-header-top {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1rem;
        }

        .icon-box {
            background: linear-gradient(135deg, var(--bg-card), var(--primary-light));
            color: var(--primary-color);
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .module-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .module-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* --- Lista de Aulas / Terminais --- */
        .lesson-list {
            padding: 1.2rem;
            list-style: none;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background-color: transparent;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 8px;
            background-color: var(--bg-surface);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .lesson-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background-color: var(--primary-color);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .lesson-item:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }

        .lesson-item:hover::before {
            transform: scaleY(1);
        }

        .lesson-item:hover .play-icon {
            color: var(--primary-color);
            text-shadow: var(--glow-text);
        }

        .play-icon {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-right: 1.2rem;
            transition: var(--transition);
        }

        .lesson-content {
            flex-grow: 1;
            min-width: 0;
        }

        .lesson-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-bottom: 0.4rem;
        }

        .lesson-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            font-family: monospace;
        }

        .lesson-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .no-results {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }

        .no-results i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: var(--border-color);
        }

        /* --- Modal Híper Tecnológico --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 2rem;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 1100px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--glow-primary);
            transform: scale(0.98);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--primary-color);
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-surface);
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: var(--glow-text);
            letter-spacing: 0.5px;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .close-btn:hover {
            background-color: rgba(255, 50, 50, 0.1);
            color: #FF3333;
            border-color: #FF3333;
            box-shadow: 0 0 10px rgba(255, 50, 50, 0.3);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            background-color: #000;
            width: 100%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Animações --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsividade Extrema (Smartphones e Tablets) --- */
        @media (max-width: 1024px) {
            .top-bar { padding: 1.5rem 2rem; }
            .main-content { padding: 2rem; }
            .modules-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        }

        @media (max-width: 768px) {
            /* A MÁGICA ACONTECE AQUI: Empilhar container em dispositivos móveis */
            .app-container { 
                flex-direction: column; 
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative; /* Remove o fixed para fluir com a página */
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                z-index: 10;
            }

            .brand {
                padding: 1.5rem;
                flex-direction: row;
                justify-content: center;
                gap: 1rem;
            }

            .brand i { margin-bottom: 0; font-size: 2rem; }
            .brand p { display: none; }

            .nav-menu {
                flex-direction: row;
                overflow-x: auto;
                padding: 1rem;
                gap: 0.8rem;
                scrollbar-width: none;
                /* Permite rolagem suave horizontal no celular */
                -webkit-overflow-scrolling: touch; 
            }

            .nav-item {
                white-space: nowrap;
                padding: 0.8rem 1.2rem;
                border-radius: 8px;
                font-size: 0.85rem;
                align-items: center;
                background-color: var(--bg-card);
                border: 1px solid var(--border-color);
            }

            .nav-item i { margin-top: 0; }

            .main-wrapper {
                margin-left: 0;
                width: 100%;
                flex-grow: 1;
            }

            .top-bar {
                padding: 1rem 1.5rem;
                flex-direction: column-reverse;
                gap: 1rem;
            }

            .search-container { width: 100%; }
            .theme-toggle { align-self: flex-end; }

            .main-content { padding: 1.5rem 1rem; }
            .phase-hero { padding: 2rem 1.5rem; }
            .phase-hero h2 { font-size: 1.8rem; }

            .modal-overlay { padding: 0; }
            .modal-container { border-radius: 0; border: none; height: 100%; display: flex; flex-direction: column; }
            .video-wrapper { flex-grow: 1; padding-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-microchip"></i>
                <div>
                    <h1>Sistema de<br>Aprendizagem Digital</h1>
                    <p>Terminal Virtual</p>
                </div>
            </div>
            <nav class="nav-menu" id="navMenu">
                </nav>
        </aside>

        <div class="main-wrapper">
            <div class="top-bar">
                <div class="search-container">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Efetuar varredura por módulos, aulas ou conceitos...">
                </div>
                <button id="themeToggle" class="theme-toggle" aria-label="Alternar interface">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>

            <main class="main-content" id="dynamicContent">
                </main>
        </div>
    </div>

    <div class="modal-overlay" id="videoModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Transmissão da Aula</h3>
                <button class="close-btn" id="closeModal" aria-label="Encerrar transmissão">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <div class="video-wrapper" id="videoWrapper">
                </div>
        </div>
    </div>

    <script>
        // Array rigorosamente preservado (100% dos dados mantidos)
        const PHASES = [

                icon: "fa-book-open",
                cards: [

                            { title: "2ª Revolução Industrial", src: "https://mega.nz/embed/DuxlFAab#1rdVy2E29gYbu_MvuWeir-MfFNMlUSyWccIZCENv4k8", duration: "28:18", views: "6.5k" },
                            { title: "3ª Revolução Industrial", src: "https://mega.nz/embed/K7ZAURZK#eMUb5IC1GdxJJBWmbF2LdqSFnLjyxDYgQjcxggKRvAo", duration: "45:22", views: "9.1k" },
                            { title: "4ª Revolução Industrial", src: "https://mega.nz/embed/njwlTBxI#YLSn7yyMOzfppRJPBDIm03kXqOMftYLR_xy9FGOEVBM", duration: "36:48", views: "15.3k" }

                    },
                    {
                        id: "card-2", title: "Introdução à Informática e Evolução da Computação",
                        desc: "Sequência de aulas que introduz a informática, apresenta a evolução da computação, diferencia tipos de computadores e explora os principais sistemas operacionais usados no dia a dia.",

                        desc: "Entenda os impactos físicos do uso prolongado de dispositivos digitais, incluindo distúrbios visuais, auditivos e lesões por esforço repetitivo (LER) associadas à interação constante com tecnologia.",
                        icon: "fa-heart-pulse",
                        videos: [

        document.addEventListener('DOMContentLoaded', () => {
            const navMenu = document.getElementById('navMenu');
            const dynamicContent = document.getElementById('dynamicContent');
            const searchInput = document.getElementById('searchInput');
            const modal = document.getElementById('videoModal');
            const closeModalBtn = document.getElementById('closeModal');
            const videoWrapper = document.getElementById('videoWrapper');
            const modalTitle = document.getElementById('modalTitle');
            const themeToggleBtn = document.getElementById('themeToggle');
            const rootElement = document.documentElement;
            
            let activePhaseIndex = 0;

            // --- Gerenciador de Tema (Forçando Claro por Padrão) ---
            // Substituído 'dark' por 'light' como default caso não haja histórico no dispositivo
            const savedTheme = localStorage.getItem('app-theme') || 'light';
            rootElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = rootElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                rootElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('app-theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                if(theme === 'dark') {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
            }

            // --- Navegação Lateral ---
            function initNav() {
                navMenu.innerHTML = ''; 
                PHASES.forEach((phase, index) => {
                    const navItem = document.createElement('div');
                    navItem.className = `nav-item ${index === activePhaseIndex ? 'active' : ''}`;
                    navItem.innerHTML = `<i class="fa-solid ${phase.icon}"></i> <span>${phase.title}</span>`;
                    
                    navItem.addEventListener('click', () => {
                        searchInput.value = '';
                        if (activePhaseIndex === index) return;
                        
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        navItem.classList.add('active');
                        
                        activePhaseIndex = index;
                        renderPhase(PHASES[activePhaseIndex]);
                    });
                    
                    navMenu.appendChild(navItem);
                });
            }

            // --- Construtor de Módulos (Cards) ---
            function buildCardsHTML(phase, cardsArray) {
                let cardsHTML = '';
                cardsArray.forEach(card => {
                    let lessonsHTML = '';
                    card.videos.forEach(video => {
                        lessonsHTML += `
                            <li class="lesson-item" data-src="${video.src}" data-title="${video.title}">
                                <i class="fa-solid fa-play play-icon"></i>
                                <div class="lesson-content">
                                    <span class="lesson-title">${video.title}</span>
                                    <div class="lesson-meta">
                                        <span><i class="fa-solid fa-stopwatch"></i> ${video.duration}</span>
                                        <span><i class="fa-solid fa-chart-simple"></i> ${video.views}</span>
                                    </div>
                                </div>
                            </li>
                        `;
                    });

                    let contextHTML = phase ? `<span class="module-context">${phase.title}</span>` : '';

                    cardsHTML += `
                        <article class="module-card">
                            <div class="module-header">
                                ${contextHTML}
                                <div class="module-header-top">
                                    <div class="icon-box">
                                        <i class="fa-solid ${card.icon}"></i>
                                    </div>
                                    <h3 class="module-title">${card.title}</h3>
                                </div>
                                <p class="module-desc">${card.desc}</p>
                            </div>
                            <ul class="lesson-list">
                                ${lessonsHTML}
                            </ul>
                        </article>
                    `;
                });
                return cardsHTML;
            }

            function renderPhase(phase) {
                dynamicContent.innerHTML = `
                    <div class="phase-hero">
                        <span class="phase-badge"><i class="fa-solid fa-server"></i> MÓDULO ${phase.number}</span>
                        <h2>${phase.title}</h2>
                        <p>${phase.description}</p>
                    </div>
                    <div class="modules-grid">
                        ${buildCardsHTML(null, phase.cards)}
                    </div>
                `;
            }

            // --- Algoritmo de Varredura (Busca) ---
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query === '') {
                    renderPhase(PHASES[activePhaseIndex]);
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

                let resultsHTML = '';
                let totalLessonsFound = 0;

                PHASES.forEach(phase => {
                    let phaseMatched = phase.title.toLowerCase().includes(query) || phase.description.toLowerCase().includes(query);
                    
                    phase.cards.forEach(card => {
                        let cardMatched = phaseMatched || card.title.toLowerCase().includes(query) || card.desc.toLowerCase().includes(query);
                        
                        let matchedVideos = card.videos.filter(video => 
                            cardMatched || video.title.toLowerCase().includes(query)
                        );

                        if (matchedVideos.length > 0) {
                            totalLessonsFound += matchedVideos.length;
                            let cloneCard = { ...card, videos: matchedVideos };
                            resultsHTML += buildCardsHTML(phase, [cloneCard]);
                        }
                    });
                });

                if (totalLessonsFound === 0) {
                    dynamicContent.innerHTML = `
                        <div class="no-results">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <h3>Dados não localizados</h3>
                            <p>O terminal não encontrou parâmetros contendo "${query}".</p>
                        </div>
                    `;
                } else {
                    dynamicContent.innerHTML = `
                        <div class="phase-hero" style="border-left-color: var(--secondary-color);">
                            <span class="phase-badge" style="color: var(--secondary-color);"><i class="fa-solid fa-radar"></i> VARREDURA ATIVA</span>
                            <h2>Resultados do Sistema</h2>
                            <p>${totalLessonsFound} bloco(s) de dados correspondem à matriz de busca <strong>"${query}"</strong>.</p>
                        </div>
                        <div class="modules-grid">
                            ${resultsHTML}
                        </div>
                    `;
                }
            });

            // --- Controle Dinâmico do Modal (Iframe) ---
            const openModal = (src, title) => {
                modalTitle.textContent = title;
                videoWrapper.innerHTML = `<iframe src="${src}" frameborder="0" allowfullscreen></iframe>`;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => { videoWrapper.innerHTML = ''; }, 300);
            };

            dynamicContent.addEventListener('click', (e) => {
                const lessonItem = e.target.closest('.lesson-item');
                if (lessonItem) {
                    const src = lessonItem.getAttribute('data-src');
                    const title = lessonItem.getAttribute('data-title');
                    openModal(src, title);
                }
            });

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
            });

            // --- Boot Sequence ---
            initNav();
            renderPhase(PHASES[0]);
        });
    </script>
