
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Aprendizagem Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Variáveis Sci-Fi & Cyberpunk --- */
        :root {
            /* Tema Claro (Corporate Sci-Fi) - Padrão */
            --primary-color: #0055FF; 
            --primary-light: rgba(0, 85, 255, 0.08);
            --secondary-color: #7000FF; 
            --bg-body: #F0F4F8; 
            --bg-surface: rgba(255, 255, 255, 0.85); 
            --bg-card: #FFFFFF;
            --text-main: #0B132B;
            --text-muted: #5C6B8A;
            --border-color: rgba(0, 85, 255, 0.15);
            --border-hover: rgba(0, 85, 255, 0.5);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            
            /* Sombras e Brilhos Tema Claro */
            --shadow-sm: 0 4px 15px rgba(0, 30, 80, 0.05);
            --shadow-md: 0 10px 30px rgba(0, 30, 80, 0.08);
            --glow-primary: 0 0 15px rgba(0, 85, 255, 0.15);
            --glow-text: none;
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --sidebar-width: 320px;
            --content-max-width: 1440px;
        }

        /* Tema Escuro (Neon Cyberpunk) */
        [data-theme="dark"] {
            --primary-color: #00F0FF; 
            --primary-light: rgba(0, 240, 255, 0.1);
            --secondary-color: #B026FF; 
            --bg-body: #050508; 
            --bg-surface: rgba(13, 17, 26, 0.8); 
            --bg-card: #0D111A;
            --text-main: #E2E8F0;
            --text-muted: #8B949E;
            --border-color: rgba(0, 240, 255, 0.15);
            --border-hover: rgba(0, 240, 255, 0.6);
            --sidebar-bg: rgba(10, 12, 18, 0.95);
            
            /* Sombras e Brilhos Neon */
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.8);
            --glow-primary: 0 0 20px rgba(0, 240, 255, 0.25), inset 0 0 10px rgba(0, 240, 255, 0.05);
            --glow-text: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center center;
            background-attachment: fixed;
        }

        /* --- Layout e Estrutura Principal --- */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            flex-direction: row;
            overflow-x: clip;
        }

        /* --- Sidebar Futurista (Glassmorphism) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            min-width: 280px;
            z-index: 50;
            transition: var(--transition);
        }

        .brand {
            padding: 2.5rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .brand i.main-icon {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            filter: drop-shadow(var(--glow-text));
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Botão do Menu Mobile (Escondido no Desktop) */
        .mobile-menu-btn {
            display: none;
        }

        .nav-menu {
            padding: 1.5rem 1rem;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }

        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-track { background: transparent; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            line-height: 1.4;
            position: relative;
        }

        .nav-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            margin-top: 0.15rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .nav-item span {
            flex-grow: 1;
        }

        .nav-item:hover {
            background-color: var(--primary-light);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-color: var(--border-hover);
            box-shadow: var(--glow-primary);
        }

        .nav-item.active i {
            text-shadow: var(--glow-text);
        }

        /* --- Conteúdo Principal --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - var(--sidebar-width));
            min-width: 0;
        }

        /* Top Bar Translúcida */
        .top-bar {
            padding: 1.25rem clamp(1rem, 2.5vw, 3rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem 1.5rem;
            flex-wrap: wrap;
            background-color: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .search-container {
            flex: 1 1 320px;
            min-width: 0;
            max-width: 720px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-toggle {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
            transform: rotate(15deg) scale(1.05);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            border-radius: 999px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
            white-space: normal;
            text-align: center;
        }

        .clear-search {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .clear-search.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .clear-search:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        mark.search-highlight {
            background: rgba(112, 0, 255, 0.18);
            color: var(--text-main);
            padding: 0.1rem 0.3rem;
            border-radius: 6px;
            font-weight: 800;
        }

        .page-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 0 0 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            box-shadow: var(--shadow-sm);
        }

        .stat-card i {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary-color);
            flex-shrink: 0;
        }

        .stat-card strong {
            display: block;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .stat-card span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .resume-section {
            margin-bottom: 2rem;
        }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .section-heading h3 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .section-heading p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .resume-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .resume-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            color: var(--text-main);
        }

        .resume-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .resume-card small {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .resume-card strong {
            display: block;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .resume-meta {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .resume-empty {
            text-align: center;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }

        .resume-empty i {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .scroll-top-btn {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: var(--transition);
            z-index: 60;
        }

        .scroll-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .lesson-item:focus-visible,
        .theme-toggle:focus-visible,
        .mobile-menu-btn:focus-visible,
        .clear-search:focus-visible,
        .scroll-top-btn:focus-visible,
        .resume-card:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 3px;
        }

        .main-content {
            padding: clamp(1rem, 2vw, 3rem);
            max-width: var(--content-max-width);
            width: 100%;
            margin: 0 auto;
            min-width: 0;
        }

        /* --- Painel da Fase & Welcome Screen --- */
        .phase-hero {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            padding: clamp(1.5rem, 3vw, 3rem);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-color);
            animation: fadeInDown 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .phase-hero::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 150px; height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary-light));
            transform: skewX(-45deg) translateX(50px);
            opacity: 0.5;
        }

        .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-light);
            color: var(--primary-color);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-color);
        }

        .phase-hero h2 {
            font-size: clamp(1.6rem, 3vw, 2.5rem);
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.2;
            letter-spacing: -1px;
            text-shadow: var(--glow-text);
            word-break: break-word;
        }

        .phase-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 900px;
            position: relative;
            z-index: 2;
        }

        /* Bem Vindo Centralizado */
        .welcome-hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            border-left-width: 1px;
            border-bottom: 4px solid var(--primary-color);
        }

        .welcome-hero i.welcome-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            filter: drop-shadow(var(--glow-primary));
        }

        /* --- Grid de Módulos (Cards Tech) --- */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
            gap: clamp(1rem, 2vw, 2rem);
            align-items: start;
        }

        .phase-view-grid {
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .phase-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
            margin: -1rem 0 2rem;
        }

        .phase-jump-list,
        .phase-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .phase-chip,
        .control-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .phase-chip:hover,
        .control-btn:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
            transform: translateY(-2px);
        }

        .module-card {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
            min-width: 0;
        }

        .module-card:hover {
            box-shadow: var(--glow-primary);
            transform: translateY(-3px);
            border-color: var(--border-hover);
        }

        .module-card.collapsed .module-body {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .module-card.collapsed .module-header {
            border-bottom-color: transparent;
        }

        .module-header {
            padding: 1.4rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom right, var(--bg-surface), transparent);
        }

        .module-context {
            font-size: 0.75rem;
            color: var(--secondary-color);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            display: block;
            letter-spacing: 1px;
        }

        .module-header-top {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
            min-width: 0;
        }

        .icon-box {
            background: linear-gradient(135deg, var(--bg-card), var(--primary-light));
            color: var(--primary-color);
            width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .module-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .module-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0.9rem;
        }

        .module-meta-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            background: var(--primary-light);
            color: var(--primary-color);
            font-size: 0.78rem;
            font-weight: 800;
            border: 1px solid var(--border-color);
        }

        .module-toggle {
            width: 100%;
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .module-toggle:hover {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .module-toggle i:last-child {
            transition: var(--transition);
        }

        .module-card.collapsed .module-toggle i:last-child {
            transform: rotate(-90deg);
        }

        .module-body {
            max-height: 2200px;
            opacity: 1;
            transition: max-height 0.35s ease, opacity 0.3s ease;
        }

        /* --- Lista de Aulas / Terminais --- */
        .lesson-list {
            padding: 1.2rem;
            list-style: none;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background-color: transparent;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1rem;
            border-radius: 12px;
            background-color: var(--bg-surface);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            min-width: 0;
        }

        .lesson-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background-color: var(--primary-color);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .lesson-item:hover {
            background-color: var(--primary-light);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }

        .lesson-item:hover::before {
            transform: scaleY(1);
        }

        .lesson-item:hover .play-icon {
            color: var(--primary-color);

        document.addEventListener('DOMContentLoaded', () => {
            const navMenu = document.getElementById('navMenu');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const dynamicContent = document.getElementById('dynamicContent');
            const searchInput = document.getElementById('searchInput');
            const modal = document.getElementById('videoModal');
            const closeModalBtn = document.getElementById('closeModal');
            const videoWrapper = document.getElementById('videoWrapper');
            const modalTitle = document.getElementById('modalTitle');
            const themeToggleBtn = document.getElementById('themeToggle');
            const clearSearchBtn = document.getElementById('clearSearch');
            const resultCount = document.getElementById('resultCount');
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            const rootElement = document.documentElement;
            const RECENT_KEY = 'app-recent-lessons';
            
            // Alterado para NULL: Página carrega sem fase pré-selecionada
            let activePhaseIndex = null;

            const platformStats = PHASES.reduce((acc, phase) => {
                acc.phases += 1;
                acc.cards += phase.cards.length;
                phase.cards.forEach(card => {
                    acc.lessons += card.videos.length;
                });
                return acc;
            }, { phases: 0, cards: 0, lessons: 0 });

            function escapeHTML(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function normalizeText(value) {
                return String(value || '')
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase()
                    .trim();
            }

            function getSearchTokens(value) {
                return [...new Set(normalizeText(value).split(/\s+/).filter(Boolean))];
            }

            function escapeRegExp(value) {
                return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function highlightMatches(value, query) {
                const safeValue = escapeHTML(value);
                const tokens = [...new Set(String(query || '').trim().split(/\s+/).filter(token => token.length > 1))];

                if (!tokens.length) {
                    return safeValue;
                }

                const expression = tokens.map(escapeRegExp).join('|');
                return safeValue.replace(new RegExp(`(${expression})`, 'gi'), '<mark class="search-highlight">$1</mark>');
            }

            function scoreMatch(tokens, sources) {
                const normalizedSources = Object.fromEntries(
                    Object.entries(sources).map(([key, content]) => [key, normalizeText(content)])
                );

                return tokens.reduce((score, token) => {
                    if (normalizedSources.phaseTitle.includes(token)) score += 12;
                    if (normalizedSources.phaseDescription.includes(token)) score += 8;
                    if (normalizedSources.cardTitle.includes(token)) score += 28;
                    if (normalizedSources.cardDescription.includes(token)) score += 10;
                    if (normalizedSources.videoTitles.includes(token)) score += 18;
                    return score;
                }, 0);
            }

            function createSearchSuggestions() {
                const suggestionValues = new Set();

                PHASES.forEach(phase => {
                    suggestionValues.add(phase.title);
                    phase.cards.forEach(card => {
                        suggestionValues.add(card.title);
                        card.videos.slice(0, 2).forEach(video => suggestionValues.add(video.title));
                    });
                });

                const datalist = document.createElement('datalist');
                datalist.id = 'searchSuggestions';

                Array.from(suggestionValues).slice(0, 80).forEach(value => {
                    const option = document.createElement('option');
                    option.value = value;
                    datalist.appendChild(option);
                });

                document.body.appendChild(datalist);
                searchInput.setAttribute('list', 'searchSuggestions');
            }

            function updateStatusPill(label) {
                resultCount.innerHTML = `<i class="fa-solid fa-signal"></i><span>${label}</span>`;
                clearSearchBtn.classList.toggle('visible', searchInput.value.trim() !== '');
            }

            function getRecentLessons() {
                try {
                    return JSON.parse(localStorage.getItem(RECENT_KEY)) || [];
                } catch {
                    return [];
                }
            }

            function saveRecentLesson(videoData) {
                const recent = getRecentLessons().filter(item => item.src !== videoData.src);
                recent.unshift({ ...videoData, watchedAt: new Date().toLocaleDateString('pt-BR') });
                localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 4)));
            }

            function buildStatsHTML(items) {
                return `
                    <section class="page-stats">
                        ${items.map(item => `
                            <div class="stat-card">
                                <i class="fa-solid ${item.icon}"></i>
                                <div>
                                    <strong>${item.value}</strong>
                                    <span>${item.label}</span>
                                </div>
                            </div>
                        `).join('')}
                    </section>
                `;
            }

            function buildRecentLessonsHTML() {
                const recent = getRecentLessons();

                if (!recent.length) {
                    return `
                        <section class="resume-section">
                            <div class="section-heading">
                                <div>
                                    <h3>Retome com facilidade</h3>
                                    <p>Seu histórico recente aparecerá aqui para continuar exatamente de onde parou.</p>
                                </div>
                            </div>
                            <div class="resume-empty">
                                <i class="fa-solid fa-clock-rotate-left"></i>
                                <p>Abra uma aula e o sistema criará atalhos rápidos automaticamente.</p>
                            </div>
                        </section>
                    `;
                }

                return `
                    <section class="resume-section">
                        <div class="section-heading">
                            <div>
                                <h3>Continue de onde parou</h3>
                                <p>Acesso rápido às últimas aulas abertas.</p>
                            </div>
                        </div>
                        <div class="resume-grid">
                            ${recent.map(item => `
                                <button class="resume-card" data-src="${item.src}" data-title="${escapeHTML(item.title)}">
                                    <small>Último acesso: ${item.watchedAt}</small>
                                    <strong>${escapeHTML(item.title)}</strong>
                                    <div class="resume-meta">
                                        <span><i class="fa-solid fa-bolt"></i> Continuar aula</span>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            function getPhaseSummary(phase) {
                const lessons = phase.cards.reduce((total, card) => total + card.videos.length, 0);
                return {
                    cards: phase.cards.length,
                    lessons
                };
            }

            function getCardSummary(card) {
                return {
                    lessons: card.videos.length
                };
            }

            function resetContentScroll() {
                const topBar = document.querySelector('.top-bar');
                const topOffset = topBar ? topBar.offsetHeight + 12 : 0;

                requestAnimationFrame(() => {
                    window.scrollTo({
                        top: Math.max(dynamicContent.offsetTop - topOffset, 0),
                        behavior: 'auto'
                    });
                });
            }

            function buildPhaseToolbarHTML(phase) {
                return `
                    <section class="phase-toolbar">
                        <div class="phase-jump-list">
                            ${phase.cards.map(card => `
                                <button class="phase-chip" type="button" data-target="${card.id}" aria-label="Ir para ${escapeHTML(card.title)}">
                                    <i class="fa-solid fa-location-arrow"></i>
                                    <span>${escapeHTML(card.title)}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="phase-controls">
                            <button class="control-btn" type="button" data-action="expand">
                                <i class="fa-solid fa-square-plus"></i>
                                <span>Expandir tudo</span>
                            </button>
                            <button class="control-btn" type="button" data-action="collapse">
                                <i class="fa-solid fa-compress"></i>
                                <span>Compactar</span>
                            </button>
                        </div>
                    </section>
                `;
            }

            // --- Gerenciador de Tema (Forçando Claro por Padrão) ---
            const savedTheme = localStorage.getItem('app-theme') || 'light';
            rootElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = rootElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                rootElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('app-theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                if(theme === 'dark') {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
            }

            // --- Controle do Menu Sanduíche Mobile ---
            mobileMenuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('open');
                const icon = mobileMenuBtn.querySelector('i');
                if(navMenu.classList.contains('open')){
                    icon.classList.replace('fa-bars', 'fa-times');
                } else {
                    icon.classList.replace('fa-times', 'fa-bars');
                }
            });

            function closeMobileMenu() {
                if(window.innerWidth <= 768 && navMenu.classList.contains('open')) {
                    navMenu.classList.remove('open');
                    mobileMenuBtn.querySelector('i').classList.replace('fa-times', 'fa-bars');
                }
            }

            // --- Tela de Boas Vindas (Estado Inicial) ---
            function renderWelcome() {
                const isMobile = window.innerWidth <= 768;
                const instrucaoTexto = isMobile 
                    ? "Selecione uma etapa no menu superior ou use a busca para encontrar aulas rapidamente."
                    : "Escolha uma fase no painel lateral ou use a busca global para localizar qualquer aula em segundos.";

                updateStatusPill(`${platformStats.phases} fases disponíveis`);
                dynamicContent.innerHTML = `
                    <div class="phase-hero welcome-hero">
                        <i class="fa-solid fa-satellite-dish welcome-icon"></i>
                        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; text-shadow: var(--glow-text);">Aprendizado mais rápido e intuitivo</h2>
                        <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 720px;">
                            ${instrucaoTexto}
                        </p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-layer-group', value: platformStats.phases, label: 'Fases disponíveis' },
                        { icon: 'fa-cubes-stacked', value: platformStats.cards, label: 'Trilhas organizadas' },
                        { icon: 'fa-circle-play', value: platformStats.lessons, label: 'Aulas prontas' }
                    ])}
                    ${buildRecentLessonsHTML()}
                `;
            }

            // --- Navegação Lateral / Mobile ---
            function initNav() {
                navMenu.innerHTML = ''; 
                PHASES.forEach((phase, index) => {
                    const navItem = document.createElement('div');
                    // Inicialmente nenhuma classe 'active'
                    navItem.className = `nav-item`;
                    navItem.innerHTML = `<i class="fa-solid ${phase.icon}"></i> <span>${phase.title}</span>`;
                    
                    navItem.addEventListener('click', () => {
                        searchInput.value = '';
                        closeMobileMenu(); // Fecha o menu sanduíche no mobile
                        
                        if (activePhaseIndex === index) return;
                        
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        navItem.classList.add('active');
                        
                        activePhaseIndex = index;
                        renderPhase(PHASES[activePhaseIndex]);
                        resetContentScroll();
                    });
                    
                    navMenu.appendChild(navItem);
                });
            }

            // --- Construtor de Módulos (Cards) ---
            function buildCardsHTML(phase, cardsArray, options = {}) {
                const { collapsible = false, expandFirst = false, showPhaseContext = false, highlightQuery = '' } = options;
                let cardsHTML = '';

                cardsArray.forEach((card, index) => {
                    const cardSummary = getCardSummary(card);
                    const isCollapsed = collapsible ? !(expandFirst && index === 0) : false;
                    let lessonsHTML = '';

                    card.videos.forEach((video, videoIndex) => {
                        const safeTitleText = escapeHTML(video.title);
                        const highlightedVideoTitle = highlightMatches(video.title, highlightQuery);
                        lessonsHTML += `
                            <li class="lesson-item" tabindex="0" role="button" aria-label="Abrir aula ${safeTitleText}" data-src="${video.src}" data-title="${safeTitleText}">
                                <span class="lesson-index">${String(videoIndex + 1).padStart(2, '0')}</span>
                                <i class="fa-solid fa-play play-icon"></i>
                                <div class="lesson-content">
                                    <span class="lesson-title">${highlightedVideoTitle}</span>
                                    <div class="lesson-meta">
                                        <span><i class="fa-solid fa-chart-simple"></i> ${video.views}</span>
                                    </div>
                                </div>
                                <span class="lesson-cta">Assistir</span>
                            </li>
                        `;
                    });

                    let contextHTML = phase && showPhaseContext ? `<span class="module-context">${highlightMatches(phase.title, highlightQuery)}</span>` : '';

                    cardsHTML += `
                        <article class="module-card ${isCollapsed ? 'collapsed' : ''}" id="${card.id}">
                            <div class="module-header">
                                ${contextHTML}
                                <div class="module-header-top">
                                    <div class="icon-box">
                                        <i class="fa-solid ${card.icon}"></i>
                                    </div>
                                    <h3 class="module-title">${highlightMatches(card.title, highlightQuery)}</h3>
                                </div>
                                <p class="module-desc">${highlightMatches(card.desc, highlightQuery)}</p>
                                <div class="module-meta-row">
                                    <span class="meta-chip"><i class="fa-solid fa-circle-play"></i> ${cardSummary.lessons} aulas</span>
                                </div>
                                <button class="module-toggle" type="button" aria-expanded="${isCollapsed ? 'false' : 'true'}">
                                    <span class="toggle-label">${isCollapsed ? 'Toque para exibir aulas' : 'Ocultar aulas'}</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                            </div>
                            <div class="module-body">
                                <ul class="lesson-list">
                                    ${lessonsHTML}
                                </ul>
                            </div>
                        </article>
                    `;
                });
                return cardsHTML;
            }

            function renderPhase(phase) {
                const summary = getPhaseSummary(phase);
                updateStatusPill(`${summary.lessons} aulas nesta fase`);

                dynamicContent.innerHTML = `
                    <div class="phase-hero">
                        <span class="phase-badge"><i class="fa-solid fa-server"></i> MÓDULO ${phase.number}</span>
                        <h2>${phase.title}</h2>
                        <p>${phase.description}</p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-cubes', value: summary.cards, label: 'Trilhas nesta fase' },
                        { icon: 'fa-circle-play', value: summary.lessons, label: 'Aulas disponíveis' }
                    ])}
                    ${buildPhaseToolbarHTML(phase)}
                    <div class="modules-grid phase-view-grid">
                        ${buildCardsHTML(phase, phase.cards, { collapsible: true, expandFirst: false, showPhaseContext: false })}
                    </div>
                `;
            }

            createSearchSuggestions();

            // --- Algoritmo de Varredura (Busca) ---
            searchInput.addEventListener('input', (e) => {
                const rawQuery = e.target.value.trim();
                const tokens = getSearchTokens(rawQuery);
                const safeQuery = escapeHTML(rawQuery);

                if (!tokens.length) {
                    if(activePhaseIndex !== null) {
                        renderPhase(PHASES[activePhaseIndex]);
                        const items = document.querySelectorAll('.nav-item');
                        if(items[activePhaseIndex]) items[activePhaseIndex].classList.add('active');
                    } else {
                        renderWelcome();
                    }
                    updateStatusPill(activePhaseIndex !== null ? `${getPhaseSummary(PHASES[activePhaseIndex]).lessons} aulas nesta fase` : `${platformStats.phases} fases disponíveis`);
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

                let totalLessonsFound = 0;
                let totalCardsFound = 0;
                const rankedResults = [];

                PHASES.forEach(phase => {
                    const phaseSearchText = normalizeText(`${phase.title} ${phase.description}`);
                    const phaseMatched = tokens.every(token => phaseSearchText.includes(token));

                    phase.cards.forEach(card => {
                        const cardSearchText = normalizeText(`${phase.title} ${phase.description} ${card.title} ${card.desc}`);
                        const cardMatched = phaseMatched || tokens.every(token => cardSearchText.includes(token));

                        let matchedVideos = card.videos.filter(video => {
                            const videoSearchText = normalizeText(`${phase.title} ${phase.description} ${card.title} ${card.desc} ${video.title}`);
                            return tokens.every(token => videoSearchText.includes(token));
                        });

                        if (cardMatched && !matchedVideos.length) {
                            matchedVideos = [...card.videos];
                        }

                        if (matchedVideos.length > 0) {
                            totalLessonsFound += matchedVideos.length;
                            totalCardsFound += 1;

                            rankedResults.push({
                                score: scoreMatch(tokens, {
                                    phaseTitle: phase.title,
                                    phaseDescription: phase.description,
                                    cardTitle: card.title,
                                    cardDescription: card.desc,
                                    videoTitles: matchedVideos.map(video => video.title).join(' ')
                                }) + matchedVideos.length,
                                html: buildCardsHTML(phase, [{ ...card, videos: matchedVideos }], {
                                    collapsible: false,
                                    showPhaseContext: true,
                                    highlightQuery: rawQuery
                                })
                            });
                        }
                    });
                });

                const resultsHTML = rankedResults
                    .sort((a, b) => b.score - a.score)
                    .map(result => result.html)
                    .join('');

                if (totalLessonsFound === 0) {
                    updateStatusPill('Nenhum resultado encontrado');
                    dynamicContent.innerHTML = `
                        <div class="no-results">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <h3>Sem resultados</h3>
                            <p>Não encontramos aulas relacionadas a <strong>"${safeQuery}"</strong>. Tente buscar por módulo, tema ou nome da aula.</p>
                        </div>
                    `;
                } else {
                    updateStatusPill(`${totalLessonsFound} resultado(s) inteligentes`);
                    dynamicContent.innerHTML = `
                        <div class="phase-hero" style="border-left-color: var(--secondary-color);">
                            <span class="phase-badge" style="color: var(--secondary-color);"><i class="fa-solid fa-radar"></i> BUSCA ATIVA</span>
                            <h2>Resultados encontrados</h2>
                            <p>${totalLessonsFound} aula(s) correspondem à busca por <strong>"${safeQuery}"</strong>.</p>
                        </div>
                        ${buildStatsHTML([
                            { icon: 'fa-circle-play', value: totalLessonsFound, label: 'Aulas encontradas' },
                            { icon: 'fa-cubes', value: totalCardsFound, label: 'Trilhas relacionadas' }
                        ])}
                        <div class="modules-grid">
                            ${resultsHTML}
                        </div>
                    `;
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const firstResult = dynamicContent.querySelector('.lesson-item, .resume-card');
                    if (firstResult) {
                        e.preventDefault();
                        firstResult.click();
                    }
                }

                if (e.key === 'Escape' && searchInput.value.trim()) {
                    searchInput.value = '';
                    searchInput.dispatchEvent(new Event('input'));
                }
            });

            document.addEventListener('keydown', (e) => {
                const activeTag = document.activeElement?.tagName;
                const isEditable = activeTag === 'INPUT' || activeTag === 'TEXTAREA';

                if (e.key === '/' && !isEditable) {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
            });

            // --- Controle Dinâmico do Modal (Iframe) ---
            const openModal = (src, title) => {
                modalTitle.textContent = title;
                videoWrapper.innerHTML = `<iframe src="${src}" title="${escapeHTML(title)}" frameborder="0" allowfullscreen></iframe>`;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                saveRecentLesson({ src, title });
                updateStatusPill('Aula em reprodução');
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => { videoWrapper.innerHTML = ''; }, 300);
            };

            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
                searchInput.focus();
            });

            dynamicContent.addEventListener('click', (e) => {
                const actionItem = e.target.closest('.lesson-item, .resume-card');
                if (actionItem) {
                    const src = actionItem.getAttribute('data-src');
                    const title = actionItem.getAttribute('data-title');
                    openModal(src, title);
                    return;
                }

                const toggleBtn = e.target.closest('.module-toggle');
                if (toggleBtn) {
                    const card = toggleBtn.closest('.module-card');
                    const isCollapsed = card.classList.toggle('collapsed');
                    toggleBtn.setAttribute('aria-expanded', String(!isCollapsed));
                    const label = toggleBtn.querySelector('.toggle-label');
                    if (label) label.textContent = isCollapsed ? 'Toque para exibir aulas' : 'Ocultar aulas';
                    return;
                }

                const phaseChip = e.target.closest('.phase-chip');
                if (phaseChip) {
                    const targetCard = document.getElementById(phaseChip.getAttribute('data-target'));
                    if (targetCard) {
                        targetCard.classList.remove('collapsed');
                        const toggle = targetCard.querySelector('.module-toggle');
                        if (toggle) {
                            toggle.setAttribute('aria-expanded', 'true');
                            const label = toggle.querySelector('.toggle-label');
                            if (label) label.textContent = 'Ocultar aulas';
                        }
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    return;
                }

                const controlBtn = e.target.closest('.control-btn');
                if (controlBtn) {
                    const collapseAll = controlBtn.getAttribute('data-action') === 'collapse';
                    document.querySelectorAll('.phase-view-grid .module-card').forEach(card => {
                        card.classList.toggle('collapsed', collapseAll);
                        const toggle = card.querySelector('.module-toggle');
                        if (toggle) {
                            toggle.setAttribute('aria-expanded', String(!collapseAll));
                            const label = toggle.querySelector('.toggle-label');
                            if (label) label.textContent = collapseAll ? 'Toque para exibir aulas' : 'Ocultar aulas';
                        }
                    });
                }
            });

            dynamicContent.addEventListener('keydown', (e) => {
                if ((e.key === 'Enter' || e.key === ' ') && e.target.closest('.lesson-item, .resume-card')) {
                    e.preventDefault();
                    e.target.closest('.lesson-item, .resume-card').click();
                }
            });

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            window.addEventListener('scroll', () => {
                scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
            });

            document.addEventListener('keydown', (e) => {
                const typingInField = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);

                if ((e.key === '/' || (e.ctrlKey && e.key.toLowerCase() === 'k')) && !typingInField) {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                    return;
                }

                if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
            });

            // --- Boot Sequence (Inicializa Interface e carrega o Vazio) ---
            initNav();
            renderWelcome();
        });
    </script>
</body>
</html>
