

<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Aprendizagem Digital</title>
    <script>
        /* Teste inicial de tela: executa antes da renderização do conteúdo */
        (function () {
            const ROOT_CLASS_PREFIXES = [
                'device-',
                'layout-',
                'orientation-',
                'pointer-',
                'density-',
                'screen-'
            ];

            function getViewportSize() {
                const root = document.documentElement;
                const width = Math.round(Math.max(root.clientWidth || 0, window.innerWidth || 0));
                const height = Math.round(Math.max(root.clientHeight || 0, window.innerHeight || 0));
                return { width, height };
            }

            function buildDeviceProfile() {
                const viewport = getViewportSize();
                const width = viewport.width;
                const height = viewport.height;
                const shortestSide = Math.min(width, height);
                const longestSide = Math.max(width, height);
                const dpr = Number((window.devicePixelRatio || 1).toFixed(2));
                const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
                const finePointer = window.matchMedia('(pointer: fine)').matches;
                const hoverCapable = window.matchMedia('(hover: hover)').matches;
                const portrait = height >= width;
                const compactHeight = height <= 720;
                const veryCompactHeight = height <= 620;
                const highDensity = dpr >= 1.5;

                /* Regra central: smartphone fica com a experiência original; tablets, notebooks e desktops usam o layout amplo. */
                const phoneLike = width <= 900 || (coarsePointer && shortestSide <= 768 && longestSide <= 1180);
                const wideLayout = !phoneLike && width >= 901;

                let category = 'desktop';
                if (phoneLike) {
                    category = 'phone';
                } else if (coarsePointer || width <= 1180) {
                    category = 'tablet';
                } else if (width <= 1440 || compactHeight) {
                    category = 'notebook';
                }

                let sidebarWidth = '360px';
                let contentMaxWidth = '1440px';
                let mainPadding = 'clamp(1rem, 2vw, 3rem)';

                if (category === 'phone') {
                    sidebarWidth = '100%';
                    contentMaxWidth = '100%';
                    mainPadding = '1rem 0.85rem 1.25rem';
                } else if (category === 'tablet') {
                    sidebarWidth = 'clamp(300px, 34vw, 380px)';
                    contentMaxWidth = '1180px';
                    mainPadding = 'clamp(1rem, 1.8vw, 1.75rem)';
                } else if (category === 'notebook') {
                    sidebarWidth = 'clamp(320px, 27vw, 390px)';
                    contentMaxWidth = '1360px';
                    mainPadding = 'clamp(1.1rem, 2vw, 2.25rem)';
                } else {
                    sidebarWidth = 'clamp(360px, 24vw, 440px)';
                    contentMaxWidth = '1600px';
                    mainPadding = 'clamp(1.5rem, 2.2vw, 3rem)';
                }

                return {
                    width,
                    height,
                    shortestSide,
                    longestSide,
                    dpr,
                    category,
                    wideLayout,
                    orientation: portrait ? 'portrait' : 'landscape',
                    pointer: coarsePointer ? 'touch' : (finePointer ? 'mouse' : 'unknown'),
                    coarsePointer,
                    finePointer,
                    hoverCapable,
                    compactHeight,
                    veryCompactHeight,
                    highDensity,
                    sidebarWidth,
                    contentMaxWidth,
                    mainPadding
                };
            }

            function applyDeviceProfile() {
                const profile = buildDeviceProfile();
                const root = document.documentElement;

                Array.from(root.classList).forEach(className => {
                    if (ROOT_CLASS_PREFIXES.some(prefix => className.startsWith(prefix))) {
                        root.classList.remove(className);
                    }
                });

                root.classList.add(
                    `device-${profile.category}`,
                    profile.wideLayout ? 'layout-wide' : 'layout-stacked',
                    `orientation-${profile.orientation}`,
                    `pointer-${profile.pointer}`,
                    profile.highDensity ? 'density-high' : 'density-standard'
                );

                if (profile.compactHeight) root.classList.add('screen-compact-height');
                if (profile.veryCompactHeight) root.classList.add('screen-very-compact-height');

                root.dataset.deviceCategory = profile.category;
                root.dataset.layoutMode = profile.wideLayout ? 'wide' : 'stacked';
                root.dataset.orientation = profile.orientation;
                root.dataset.pointer = profile.pointer;

                root.style.setProperty('--app-vh', `${profile.height * 0.01}px`);
                root.style.setProperty('--app-vw', `${profile.width * 0.01}px`);
                root.style.setProperty('--detected-sidebar-width', profile.sidebarWidth);
                root.style.setProperty('--detected-content-max-width', profile.contentMaxWidth);
                root.style.setProperty('--detected-main-padding', profile.mainPadding);

                window.__DEVICE_PROFILE__ = profile;
                return profile;
            }

            window.__buildDeviceProfile = buildDeviceProfile;
            window.__applyDeviceProfile = applyDeviceProfile;
            applyDeviceProfile();

            let resizeFrame = null;
            const queueProfileRefresh = () => {
                window.cancelAnimationFrame(resizeFrame);
                resizeFrame = window.requestAnimationFrame(() => {
                    const previousMode = window.__DEVICE_PROFILE__?.wideLayout ? 'wide' : 'stacked';
                    const profile = applyDeviceProfile();
                    const nextMode = profile.wideLayout ? 'wide' : 'stacked';
                    document.dispatchEvent(new CustomEvent('adaptive-profile-change', {
                        detail: { profile, previousMode, nextMode }
                    }));
                });
            };

            window.addEventListener('resize', queueProfileRefresh, { passive: true });
            window.addEventListener('orientationchange', queueProfileRefresh, { passive: true });
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Variáveis Sci-Fi & Cyberpunk --- */
        :root {
            /* Tema Claro (Corporate Sci-Fi) - Padrão */
            --primary-color: #0055FF; 
            --primary-light: rgba(0, 85, 255, 0.08);
            --secondary-color: #7000FF; 
            --bg-body: #F0F4F8; 
            --bg-surface: rgba(255, 255, 255, 0.85); 
            --bg-card: #FFFFFF;
            --text-main: #0B132B;
            --text-muted: #5C6B8A;
            --border-color: rgba(0, 85, 255, 0.15);
            --border-hover: rgba(0, 85, 255, 0.5);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --sidebar-phase-color: #0055FF;
            --sidebar-phase-soft: rgba(0, 85, 255, 0.10);
            --sidebar-topic-color: #7C3AED;
            --sidebar-topic-soft: rgba(124, 58, 237, 0.10);
            --sidebar-video-color: #059669;
            --sidebar-video-soft: rgba(5, 150, 105, 0.11);
            
            /* Sombras e Brilhos Tema Claro */
            --shadow-sm: 0 4px 15px rgba(0, 30, 80, 0.05);
            --shadow-md: 0 10px 30px rgba(0, 30, 80, 0.08);
            --glow-primary: 0 0 15px rgba(0, 85, 255, 0.15);
            --glow-text: none;
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --sidebar-width: 360px;
            --content-max-width: 1440px;
        }

        /* Tema Escuro (Neon Cyberpunk) */
        [data-theme="dark"] {
            --primary-color: #00F0FF; 
            --primary-light: rgba(0, 240, 255, 0.1);
            --secondary-color: #B026FF; 
            --bg-body: #050508; 
            --bg-surface: rgba(13, 17, 26, 0.8); 
            --bg-card: #0D111A;
            --text-main: #E2E8F0;
            --text-muted: #8B949E;
            --border-color: rgba(0, 240, 255, 0.15);
            --border-hover: rgba(0, 240, 255, 0.6);
            --sidebar-bg: rgba(10, 12, 18, 0.95);
            --sidebar-phase-color: #00F0FF;
            --sidebar-phase-soft: rgba(0, 240, 255, 0.12);
            --sidebar-topic-color: #B026FF;
            --sidebar-topic-soft: rgba(176, 38, 255, 0.13);
            --sidebar-video-color: #22C55E;
            --sidebar-video-soft: rgba(34, 197, 94, 0.13);
            
            /* Sombras e Brilhos Neon */
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.8);
            --glow-primary: 0 0 20px rgba(0, 240, 255, 0.25), inset 0 0 10px rgba(0, 240, 255, 0.05);
            --glow-text: 0 0 8px rgba(0, 240, 255, 0.4);
        }



        /* --- Perfil adaptativo de tela: classes aplicadas antes da página renderizar --- */
        :root {
            --app-vh: 1vh;
            --app-vw: 1vw;
            --detected-sidebar-width: var(--sidebar-width);
            --detected-content-max-width: var(--content-max-width);
            --detected-main-padding: clamp(1rem, 2vw, 3rem);
            --topbar-height: 88px;
            --main-content-height: calc((var(--app-vh) * 100) - var(--topbar-height));
            --inline-video-max-height: 62vh;
            --inline-video-max-width: 100%;
            --content-fit-scale: 1;
        }

        html.layout-wide {
            --sidebar-width: var(--detected-sidebar-width);
            --content-max-width: var(--detected-content-max-width);
        }

        html.layout-wide .sidebar {
            height: calc(var(--app-vh) * 100);
        }

        html.layout-wide,
        html.layout-wide body {
            height: calc(var(--app-vh) * 100);
            overflow: hidden;
        }

        html.layout-wide .app-container {
            height: calc(var(--app-vh) * 100);
            min-height: 0;
            overflow: hidden;
        }

        html.layout-wide .main-wrapper {
            height: calc(var(--app-vh) * 100);
            min-height: 0;
            overflow: hidden;
        }

        html.layout-wide .top-bar {
            flex: 0 0 auto;
        }

        html.layout-wide .main-content {
            padding: var(--detected-main-padding);
            height: calc((var(--app-vh) * 100) - var(--topbar-height));
            max-height: calc((var(--app-vh) * 100) - var(--topbar-height));
            overflow: hidden;
            overscroll-behavior: none;
            container-type: size;
        }

        html.device-tablet.layout-wide .brand,
        html.device-notebook.layout-wide.screen-compact-height .brand {
            padding: 1.35rem 1rem;
        }

        html.device-tablet.layout-wide .brand h1,
        html.device-notebook.layout-wide.screen-compact-height .brand h1 {
            font-size: 1.18rem;
        }

        html.device-tablet.layout-wide .brand p,
        html.device-notebook.layout-wide.screen-compact-height .brand p {
            font-size: 0.68rem;
            letter-spacing: 1.4px;
        }

        html.layout-wide.screen-compact-height .nav-menu {
            padding: 1rem 0.8rem 4.5rem;
            gap: 0.42rem;
        }

        html.layout-wide.screen-compact-height .nav-item {
            padding: 0.78rem;
            gap: 0.75rem;
        }

        html.layout-wide.screen-compact-height .nav-topic-btn {
            padding: 0.64rem;
        }

        html.layout-wide.screen-compact-height .nav-topic-panel {
            padding: 0.6rem;
        }

        html.layout-wide.screen-compact-height .sidebar-lesson-item {
            padding: 0.55rem;
        }

        html.layout-wide.screen-compact-height .inline-video-header {
            padding: 0.9rem 1rem;
        }

        html.layout-wide.screen-compact-height .inline-video-header h2 {
            font-size: clamp(1.05rem, 1.8vw, 1.55rem);
        }

        html.layout-wide.screen-compact-height .inline-video-subtitle,
        html.layout-wide.screen-compact-height .inline-video-footer {
            font-size: 0.82rem;
        }

        html.layout-wide.screen-compact-height .inline-video-wrapper {
            max-height: calc((var(--app-vh) * 100) - 15rem);
        }

        html.device-tablet.layout-wide .top-bar,
        html.device-notebook.layout-wide.screen-compact-height .top-bar {
            padding-block: 0.9rem;
        }

        html.device-tablet.layout-wide .search-container input,
        html.device-notebook.layout-wide.screen-compact-height .search-container input {
            padding-block: 0.82rem;
        }

        html.orientation-portrait.device-tablet.layout-wide .main-wrapper {
            width: calc(100% - var(--sidebar-width));
        }


        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center center;
            background-attachment: fixed;
        }

        /* --- Layout e Estrutura Principal --- */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            flex-direction: row;
            overflow-x: clip;
        }

        /* --- Sidebar Futurista (Glassmorphism) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            min-width: 280px;
            z-index: 50;
            transition: var(--transition);
        }

        .brand {
            padding: 2.5rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .brand i.main-icon {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            filter: drop-shadow(var(--glow-text));
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--primary-color);
            margin-top: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Botão do Menu Mobile (Escondido no Desktop) */
        .mobile-menu-btn {
            display: none;
        }

        .nav-menu {
            padding: 1.5rem 1rem;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }

        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-track { background: transparent; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .nav-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid transparent;
            line-height: 1.4;
            position: relative;
        }

        .nav-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            margin-top: 0.15rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .nav-item span {
            flex-grow: 1;
        }

        .nav-item:hover {
            background-color: var(--primary-light);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-color: var(--border-hover);
            box-shadow: var(--glow-primary);
        }

        .nav-item.active i {
            text-shadow: var(--glow-text);
        }

        /* --- Navegação lateral expandida para desktops, notebooks e tablets --- */
        .sidebar-legend {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.45rem;
            margin: 0 0 0.8rem;
            padding: 0.85rem;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .sidebar-legend-title {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--text-main);
            font-size: 0.72rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            margin-bottom: 0.15rem;
        }

        .sidebar-legend-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.74rem;
            font-weight: 800;
            line-height: 1.25;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px var(--bg-card);
        }

        .legend-dot.phase { background: var(--sidebar-phase-color); }
        .legend-dot.topic { background: var(--sidebar-topic-color); }
        .legend-dot.video { background: var(--sidebar-video-color); }

        .nav-phase-block {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .nav-phase-block > .nav-item {
            border-color: rgba(0, 85, 255, 0.10);
            border-left: 5px solid var(--sidebar-phase-color);
            background: linear-gradient(90deg, var(--sidebar-phase-soft), transparent 74%);
            color: var(--text-main);
            box-shadow: 0 4px 14px rgba(0, 30, 80, 0.04);
        }

        .nav-phase-block > .nav-item i {
            color: var(--sidebar-phase-color);
        }

        .nav-phase-block > .nav-item:hover {
            background: linear-gradient(90deg, var(--sidebar-phase-soft), var(--primary-light));
            color: var(--sidebar-phase-color);
            border-color: var(--sidebar-phase-color);
            box-shadow: var(--glow-primary);
        }

        .nav-phase-block > .nav-item.active {
            background: linear-gradient(90deg, var(--sidebar-phase-soft), rgba(255,255,255,0));
            color: var(--sidebar-phase-color);
            border-color: var(--sidebar-phase-color);
            box-shadow: var(--glow-primary);
        }

        .nav-phase-main {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-width: 0;
            flex: 1;
        }

        .nav-type-label {
            width: fit-content;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.18rem 0.5rem;
            border-radius: 999px;
            font-size: 0.62rem;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1px solid currentColor;
        }

        .nav-type-label.phase {
            color: var(--sidebar-phase-color);
            background: var(--sidebar-phase-soft);
        }

        .nav-type-label.topic {
            color: var(--sidebar-topic-color);
            background: var(--sidebar-topic-soft);
        }

        .nav-type-label.video {
            color: var(--sidebar-video-color);
            background: var(--sidebar-video-soft);
        }

        .nav-label-title {
            display: block;
            line-height: 1.35;
        }

        .nav-topic-tree {
            display: none;
            margin: 0 0 0.55rem 1.2rem;
            padding: 0.4rem 0 0.15rem 0.95rem;
            border-left: 2px solid var(--sidebar-topic-color);
            flex-direction: column;
            gap: 0.55rem;
            animation: fadeInDown 0.25s ease-out;
        }

        .nav-phase-block.expanded > .nav-topic-tree {
            display: flex;
        }

        .nav-topic-block {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .nav-topic-btn {
            width: 100%;
            display: grid;
            grid-template-columns: 28px 1fr 16px;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 0.75rem;
            border-radius: 10px;
            border: 1px solid rgba(124, 58, 237, 0.18);
            border-left: 4px solid var(--sidebar-topic-color);
            background: linear-gradient(90deg, var(--sidebar-topic-soft), transparent 78%);
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.82rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .nav-topic-btn:hover,
        .nav-topic-btn.active {
            background: linear-gradient(90deg, var(--sidebar-topic-soft), var(--bg-card));
            color: var(--sidebar-topic-color);
            border-color: var(--sidebar-topic-color);
            box-shadow: 0 0 16px var(--sidebar-topic-soft);
        }

        .topic-number {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sidebar-topic-soft);
            border: 1px solid var(--sidebar-topic-color);
            color: var(--sidebar-topic-color);
            font-size: 0.72rem;
            font-weight: 900;
        }

        .nav-topic-panel {
            margin-left: 0.35rem;
            padding: 0.75rem;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid rgba(5, 150, 105, 0.16);
            border-left: 4px solid var(--sidebar-video-color);
            box-shadow: var(--shadow-sm);
        }

        .nav-topic-desc {
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.55;
            margin-bottom: 0.7rem;
        }

        .nav-topic-meta {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.65rem;
            padding: 0.35rem 0.6rem;
            border-radius: 999px;
            background: var(--sidebar-video-soft);
            color: var(--sidebar-video-color);
            border: 1px solid var(--sidebar-video-color);
            font-size: 0.72rem;
            font-weight: 900;
        }

        .sidebar-lesson-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .sidebar-lesson-item {
            width: 100%;
            display: grid;
            grid-template-columns: 24px 1fr;
            align-items: center;
            gap: 0.55rem;
            padding: 0.65rem;
            border-radius: 10px;
            border: 1px solid rgba(5, 150, 105, 0.18);
            border-left: 4px solid var(--sidebar-video-color);
            background: linear-gradient(90deg, var(--sidebar-video-soft), var(--bg-surface));
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }

        .sidebar-lesson-item:hover,
        .sidebar-lesson-item.active {
            border-color: var(--sidebar-video-color);
            background: linear-gradient(90deg, var(--sidebar-video-soft), var(--bg-card));
            box-shadow: 0 0 18px var(--sidebar-video-soft);
            color: var(--sidebar-video-color);
        }

        .sidebar-lesson-index {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sidebar-video-soft);
            color: var(--sidebar-video-color);
            border: 1px solid var(--sidebar-video-color);
            font-size: 0.68rem;
            font-weight: 900;
        }

        .sidebar-lesson-title {
            display: block;
            font-size: 0.78rem;
            font-weight: 800;
            line-height: 1.35;
        }

        .sidebar-lesson-meta {
            display: block;
            margin-top: 0.25rem;
            color: var(--text-muted);
            font-size: 0.68rem;
            font-weight: 700;
        }

        .sidebar-lesson-item:hover .sidebar-lesson-meta,
        .sidebar-lesson-item.active .sidebar-lesson-meta {
            color: var(--sidebar-video-color);
        }

        .nav-topic-btn:focus-visible,
        .sidebar-lesson-item:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 3px;
        }

        /* --- Conteúdo Principal --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - var(--sidebar-width));
            min-width: 0;
        }

        /* Top Bar Translúcida */
        .top-bar {
            padding: 1.25rem clamp(1rem, 2.5vw, 3rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem 1.5rem;
            flex-wrap: wrap;
            background-color: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .search-container {
            flex: 1 1 320px;
            min-width: 0;
            max-width: 720px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .search-container i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .theme-toggle {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
            transform: rotate(15deg) scale(1.05);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1rem;
            border-radius: 999px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
            white-space: normal;
            text-align: center;
        }

        .clear-search {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .clear-search.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .clear-search:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        mark.search-highlight {
            background: rgba(112, 0, 255, 0.18);
            color: var(--text-main);
            padding: 0.1rem 0.3rem;
            border-radius: 6px;
            font-weight: 800;
        }

        .page-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 0 0 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            box-shadow: var(--shadow-sm);
        }

        .stat-card i {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary-color);
            flex-shrink: 0;
        }

        .stat-card strong {
            display: block;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .stat-card span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .resume-section {
            margin-bottom: 2rem;
        }

        .section-heading {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .section-heading h3 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .section-heading p {
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .resume-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }

        .resume-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            color: var(--text-main);
        }

        .resume-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-color);
            box-shadow: var(--glow-primary);
        }

        .resume-card small {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
        }

        .resume-card strong {
            display: block;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .resume-meta {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .resume-empty {
            text-align: center;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px dashed var(--border-color);
            color: var(--text-muted);
        }

        .resume-empty i {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .scroll-top-btn {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: var(--transition);
            z-index: 60;
        }

        .scroll-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .lesson-item:focus-visible,
        .theme-toggle:focus-visible,
        .mobile-menu-btn:focus-visible,
        .clear-search:focus-visible,
        .scroll-top-btn:focus-visible,
        .resume-card:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 3px;
        }

        .main-content {
            padding: clamp(1rem, 2vw, 3rem);
            max-width: var(--content-max-width);
            width: 100%;
            margin: 0 auto;
            min-width: 0;
        }

        /* --- Ajuste de encaixe da área central para telas maiores --- */
        html.layout-wide .main-content.content-fit-applied {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: clamp(0.7rem, 1.2vw, 1rem);
            overflow-y: hidden;
            overflow-x: hidden;
            min-height: 0;
        }

        html.layout-wide .main-content.content-fit-applied > * {
            flex-shrink: 0;
            min-width: 0;
        }

        html.layout-wide .main-content.content-has-video {
            justify-content: center;
            gap: 0;
        }

        html.layout-wide .main-content.content-has-video > * {
            flex: 1 1 auto;
            min-height: 0;
        }

        html.layout-wide .main-content.content-fit-applied:not(.content-has-video) {
            justify-content: center;
        }

        html.layout-wide .main-content.content-fit-applied:not(.content-has-video) .phase-hero,
        html.layout-wide .main-content.content-fit-applied:not(.content-has-video) .page-stats,
        html.layout-wide .main-content.content-fit-applied:not(.content-has-video) .desktop-empty-state,
        html.layout-wide .main-content.content-fit-applied:not(.content-has-video) .resume-section {
            margin-block: 0;
        }

        html.layout-wide .main-content.fit-level-2:not(.content-has-video),
        html.layout-wide .main-content.fit-level-3:not(.content-has-video) {
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(220px, 0.65fr);
            grid-auto-rows: auto;
            align-content: center;
            align-items: stretch;
            column-gap: clamp(0.8rem, 1.4vw, 1.25rem);
            row-gap: 0.75rem;
        }

        html.layout-wide .main-content.fit-level-2:not(.content-has-video) .phase-hero,
        html.layout-wide .main-content.fit-level-3:not(.content-has-video) .phase-hero {
            grid-column: 1;
            height: 100%;
        }

        html.layout-wide .main-content.fit-level-2:not(.content-has-video) .page-stats,
        html.layout-wide .main-content.fit-level-3:not(.content-has-video) .page-stats {
            grid-column: 2;
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.55rem;
        }

        html.layout-wide .main-content.fit-level-2:not(.content-has-video) .desktop-empty-state,
        html.layout-wide .main-content.fit-level-3:not(.content-has-video) .desktop-empty-state {
            grid-column: 1 / -1;
        }

        html.layout-wide .main-content.fit-level-4:not(.content-has-video) {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 0.34fr);
            align-content: center;
            align-items: center;
            column-gap: 0.75rem;
            row-gap: 0.5rem;
        }

        html.layout-wide .main-content.fit-level-4:not(.content-has-video) .phase-hero {
            grid-column: 1;
            margin: 0;
        }

        html.layout-wide .main-content.fit-level-4:not(.content-has-video) .page-stats {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            margin: 0;
        }

        html.layout-wide .main-content.fit-level-4:not(.content-has-video) .desktop-empty-state,
        html.layout-wide .main-content.fit-level-4:not(.content-has-video) .resume-section {
            display: none;
        }

        html.layout-wide .main-content.fit-level-5:not(.content-has-video) {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 0;
        }

        html.layout-wide .main-content.fit-level-5:not(.content-has-video) .phase-hero {
            margin: 0;
            width: 100%;
        }

        html.layout-wide .main-content.fit-level-5:not(.content-has-video) .page-stats,
        html.layout-wide .main-content.fit-level-5:not(.content-has-video) .desktop-empty-state,
        html.layout-wide .main-content.fit-level-5:not(.content-has-video) .resume-section {
            display: none;
        }

        html.layout-wide .main-content.fit-level-1 .phase-hero {
            padding: clamp(1rem, 1.8vw, 1.75rem);
            margin-bottom: 1rem;
        }

        html.layout-wide .main-content.fit-level-1 .phase-hero h2 {
            font-size: clamp(1.3rem, 2.1vw, 2rem);
            margin-bottom: 0.7rem;
        }

        html.layout-wide .main-content.fit-level-1 .phase-hero p {
            font-size: 0.98rem;
            line-height: 1.55;
        }

        html.layout-wide .main-content.fit-level-1 .page-stats {
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        html.layout-wide .main-content.fit-level-1 .stat-card {
            padding: 0.75rem 0.85rem;
        }

        html.layout-wide .main-content.fit-level-1 .desktop-empty-state {
            padding: 1.1rem 1.2rem;
        }

        html.layout-wide .main-content.fit-level-2 {
            gap: 0.65rem;
        }

        html.layout-wide .main-content.fit-level-2 .phase-hero {
            padding: 1rem 1.1rem;
            margin-bottom: 0.65rem;
        }

        html.layout-wide .main-content.fit-level-2 .phase-badge {
            margin-bottom: 0.65rem;
            padding: 0.38rem 0.8rem;
            font-size: 0.72rem;
        }

        html.layout-wide .main-content.fit-level-2 .phase-hero h2 {
            font-size: clamp(1.15rem, 1.8vw, 1.7rem);
            margin-bottom: 0.5rem;
        }

        html.layout-wide .main-content.fit-level-2 .phase-hero p {
            font-size: 0.9rem;
            line-height: 1.42;
        }

        html.layout-wide .main-content.fit-level-2 .page-stats {
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            gap: 0.55rem;
            margin-bottom: 0.65rem;
        }

        html.layout-wide .main-content.fit-level-2 .stat-card {
            padding: 0.58rem 0.65rem;
            gap: 0.55rem;
        }

        html.layout-wide .main-content.fit-level-2 .stat-card i {
            width: 34px;
            height: 34px;
            border-radius: 10px;
        }

        html.layout-wide .main-content.fit-level-2 .stat-card strong {
            font-size: 0.98rem;
        }

        html.layout-wide .main-content.fit-level-2 .desktop-empty-state {
            padding: 0.85rem 1rem;
        }

        html.layout-wide .main-content.fit-level-2 .desktop-empty-state i {
            font-size: 1.7rem;
            margin-bottom: 0.45rem;
        }

        html.layout-wide .main-content.fit-level-2 .desktop-empty-state h3 {
            font-size: 1rem;
            margin-bottom: 0.35rem;
        }

        html.layout-wide .main-content.fit-level-2 .desktop-empty-state p {
            font-size: 0.86rem;
            line-height: 1.38;
        }

        html.layout-wide .main-content.fit-level-3 {
            gap: 0.45rem;
        }

        html.layout-wide .main-content.fit-level-3 .phase-hero {
            padding: 0.8rem 0.9rem;
            margin-bottom: 0.45rem;
            border-left-width: 3px;
        }

        html.layout-wide .main-content.fit-level-3 .phase-badge {
            margin-bottom: 0.45rem;
        }

        html.layout-wide .main-content.fit-level-3 .phase-hero h2 {
            font-size: clamp(1rem, 1.55vw, 1.45rem);
            margin-bottom: 0.35rem;
        }

        html.layout-wide .main-content.fit-level-3 .phase-hero p {
            font-size: 0.82rem;
            line-height: 1.32;
        }

        html.layout-wide .main-content.fit-level-3 .page-stats {
            grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
            gap: 0.45rem;
            margin-bottom: 0.45rem;
        }

        html.layout-wide .main-content.fit-level-3 .stat-card {
            padding: 0.46rem 0.55rem;
            gap: 0.45rem;
        }

        html.layout-wide .main-content.fit-level-3 .stat-card i {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            font-size: 0.85rem;
        }

        html.layout-wide .main-content.fit-level-3 .stat-card strong {
            font-size: 0.88rem;
        }

        html.layout-wide .main-content.fit-level-3 .stat-card span {
            font-size: 0.72rem;
        }

        html.layout-wide .main-content.fit-level-3 .desktop-empty-state {
            padding: 0.65rem 0.75rem;
        }

        html.layout-wide .main-content.fit-level-3 .desktop-empty-state i {
            display: none;
        }

        html.layout-wide .main-content.fit-level-3 .desktop-empty-state h3 {
            font-size: 0.92rem;
            margin-bottom: 0.25rem;
        }

        html.layout-wide .main-content.fit-level-3 .desktop-empty-state p {
            font-size: 0.8rem;
            line-height: 1.28;
        }

        html.layout-wide .main-content.content-overflowing .page-stats {
            display: none;
        }

        html.layout-wide .main-content.content-overflowing .desktop-empty-state {
            padding: 0.55rem 0.65rem;
        }


        html.layout-wide .main-content.fit-level-4 .phase-hero {
            padding: 0.72rem 0.85rem;
            border-left-width: 3px;
        }

        html.layout-wide .main-content.fit-level-4 .phase-badge {
            margin-bottom: 0.32rem;
            padding: 0.28rem 0.62rem;
            font-size: 0.64rem;
        }

        html.layout-wide .main-content.fit-level-4 .phase-hero h2 {
            font-size: clamp(0.95rem, 1.35vw, 1.25rem);
            line-height: 1.16;
            margin-bottom: 0.28rem;
        }

        html.layout-wide .main-content.fit-level-4 .phase-hero p {
            font-size: 0.76rem;
            line-height: 1.24;
        }

        html.layout-wide .main-content.fit-level-4 .stat-card {
            padding: 0.38rem 0.46rem;
            gap: 0.38rem;
        }

        html.layout-wide .main-content.fit-level-4 .stat-card i {
            width: 26px;
            height: 26px;
            font-size: 0.72rem;
            border-radius: 8px;
        }

        html.layout-wide .main-content.fit-level-4 .stat-card strong {
            font-size: 0.78rem;
        }

        html.layout-wide .main-content.fit-level-4 .stat-card span {
            font-size: 0.66rem;
        }

        html.layout-wide .main-content.fit-level-5 .phase-hero {
            padding: 0.58rem 0.7rem;
            border-left-width: 3px;
        }

        html.layout-wide .main-content.fit-level-5 .phase-badge {
            display: none;
        }

        html.layout-wide .main-content.fit-level-5 .phase-hero h2 {
            font-size: clamp(0.88rem, 1.18vw, 1.08rem);
            line-height: 1.12;
            margin-bottom: 0.22rem;
        }

        html.layout-wide .main-content.fit-level-5 .phase-hero p {
            font-size: 0.7rem;
            line-height: 1.18;
        }

        html.layout-wide .main-content.content-overflowing:not(.content-has-video) .phase-hero p {
            display: -webkit-box;
            -webkit-line-clamp: 6;
            line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- Painel da Fase & Welcome Screen --- */
        .phase-hero {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-surface));
            padding: clamp(1.5rem, 3vw, 3rem);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--primary-color);
            animation: fadeInDown 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .phase-hero::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 150px; height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary-light));
            transform: skewX(-45deg) translateX(50px);
            opacity: 0.5;
        }

        .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-light);
            color: var(--primary-color);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border-color);
        }

        .phase-hero h2 {
            font-size: clamp(1.6rem, 3vw, 2.5rem);
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.2;
            letter-spacing: -1px;
            text-shadow: var(--glow-text);
            word-break: break-word;
        }

        .phase-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            max-width: 900px;
            position: relative;
            z-index: 2;
        }

        /* Bem Vindo Centralizado */
        .welcome-hero {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            border-left-width: 1px;
            border-bottom: 4px solid var(--primary-color);
        }

        .welcome-hero i.welcome-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            filter: drop-shadow(var(--glow-primary));
        }

        /* --- Grid de Módulos (Cards Tech) --- */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
            gap: clamp(1rem, 2vw, 2rem);
            align-items: start;
        }

        .phase-view-grid {
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .phase-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
            margin: -1rem 0 2rem;
        }

        .phase-jump-list,

        .modal-overlay {
            position: fixed;

            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 2rem;
            overflow-y: auto;

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-container {
            background-color: var(--bg-card);
            width: min(100%, 1100px, calc((100dvh - 9rem) * 16 / 9));
            max-height: min(calc(100dvh - 4rem), 900px);

            box-shadow: var(--glow-primary);

            justify-content: space-between;

        document.addEventListener('DOMContentLoaded', () => {
            const navMenu = document.getElementById('navMenu');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const dynamicContent = document.getElementById('dynamicContent');
            const searchInput = document.getElementById('searchInput');
            const modal = document.getElementById('videoModal');
            const closeModalBtn = document.getElementById('closeModal');
            const videoWrapper = document.getElementById('videoWrapper');
            const modalTitle = document.getElementById('modalTitle');
            const themeToggleBtn = document.getElementById('themeToggle');
            const clearSearchBtn = document.getElementById('clearSearch');
            const resultCount = document.getElementById('resultCount');
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            const rootElement = document.documentElement;
            const RECENT_KEY = 'app-recent-lessons';
            
            // Alterado para NULL: Página carrega sem fase pré-selecionada
            let activePhaseIndex = null;
            let activeCardId = null;
            let activeVideoSrc = null;
            let currentDeviceProfile = window.__applyDeviceProfile ? window.__applyDeviceProfile() : (window.__DEVICE_PROFILE__ || null);

            function syncDeviceProfile() {
                currentDeviceProfile = window.__applyDeviceProfile ? window.__applyDeviceProfile() : (window.__DEVICE_PROFILE__ || currentDeviceProfile);
                if (!currentDeviceProfile && window.__buildDeviceProfile) {
                    currentDeviceProfile = window.__buildDeviceProfile();
                }
                if (currentDeviceProfile && document.body) {
                    document.body.dataset.deviceCategory = currentDeviceProfile.category;
                    document.body.dataset.layoutMode = currentDeviceProfile.wideLayout ? 'wide' : 'stacked';
                    document.body.dataset.orientation = currentDeviceProfile.orientation;
                }
                return currentDeviceProfile;
            }

            function isWideLayout() {
                return Boolean(syncDeviceProfile()?.wideLayout);
            }

            const platformStats = PHASES.reduce((acc, phase) => {
                acc.phases += 1;
                acc.cards += phase.cards.length;
                phase.cards.forEach(card => {
                    acc.lessons += card.videos.length;
                });
                return acc;
            }, { phases: 0, cards: 0, lessons: 0 });

            function getDeviceStatusText() {
                const profile = syncDeviceProfile();
                if (!profile) return getDeviceStatusText();
                const deviceLabel = {
                    phone: 'smartphone',
                    tablet: 'tablet',
                    notebook: 'notebook',
                    desktop: 'desktop'
                }[profile.category] || 'dispositivo';
                return `${platformStats.phases} fases disponíveis · layout para ${deviceLabel}`;
            }

            function escapeHTML(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function normalizeText(value) {
                return String(value || '')
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase()
                    .trim();
            }

            function getSearchTokens(value) {
                return [...new Set(normalizeText(value).split(/\s+/).filter(Boolean))];
            }

            function escapeRegExp(value) {
                return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function highlightMatches(value, query) {
                const safeValue = escapeHTML(value);
                const tokens = [...new Set(String(query || '').trim().split(/\s+/).filter(token => token.length > 1))];

                if (!tokens.length) {
                    return safeValue;
                }

                const expression = tokens.map(escapeRegExp).join('|');
                return safeValue.replace(new RegExp(`(${expression})`, 'gi'), '<mark class="search-highlight">$1</mark>');
            }

            function scoreMatch(tokens, sources) {
                const normalizedSources = Object.fromEntries(
                    Object.entries(sources).map(([key, content]) => [key, normalizeText(content)])
                );

                return tokens.reduce((score, token) => {
                    if (normalizedSources.phaseTitle.includes(token)) score += 12;
                    if (normalizedSources.phaseDescription.includes(token)) score += 8;
                    if (normalizedSources.cardTitle.includes(token)) score += 28;
                    if (normalizedSources.cardDescription.includes(token)) score += 10;
                    if (normalizedSources.videoTitles.includes(token)) score += 18;
                    return score;
                }, 0);
            }

            function createSearchSuggestions() {
                const suggestionValues = new Set();

                PHASES.forEach(phase => {
                    suggestionValues.add(phase.title);
                    phase.cards.forEach(card => {
                        suggestionValues.add(card.title);
                        card.videos.slice(0, 2).forEach(video => suggestionValues.add(video.title));
                    });
                });

                const datalist = document.createElement('datalist');
                datalist.id = 'searchSuggestions';

                Array.from(suggestionValues).slice(0, 80).forEach(value => {
                    const option = document.createElement('option');
                    option.value = value;
                    datalist.appendChild(option);
                });

                document.body.appendChild(datalist);
                searchInput.setAttribute('list', 'searchSuggestions');
            }

            function updateStatusPill(label) {
                resultCount.innerHTML = `<i class="fa-solid fa-signal"></i><span>${label}</span>`;
                clearSearchBtn.classList.toggle('visible', searchInput.value.trim() !== '');
            }

            function getRecentLessons() {
                try {
                    return JSON.parse(localStorage.getItem(RECENT_KEY)) || [];
                } catch {
                    return [];
                }
            }

            function saveRecentLesson(videoData) {
                const recent = getRecentLessons().filter(item => item.src !== videoData.src);
                recent.unshift({ ...videoData, watchedAt: new Date().toLocaleDateString('pt-BR') });
                localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0, 4)));
            }

            function buildStatsHTML(items) {
                return `

            }

            function buildRecentLessonsHTML() {
                const recent = getRecentLessons();

                if (!recent.length) {
                    return `
                        <section class="resume-section">

                return `

                                    <small>Último acesso: ${item.watchedAt}</small>
                                    <strong>${escapeHTML(item.title)}</strong>
                                    <div class="resume-meta">
                                        <span><i class="fa-solid fa-bolt"></i> Continuar aula</span>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                    </section>
                `;
            }

            function getPhaseSummary(phase) {
                const lessons = phase.cards.reduce((total, card) => total + card.videos.length, 0);
                return {
                    cards: phase.cards.length,
                    lessons
                };
            }

            function getCardSummary(card) {
                return {
                    lessons: card.videos.length
                };
            }

            function resetContentScroll() {
                if (isWideLayout()) {
                    window.scrollTo({ top: 0, behavior: 'auto' });
                    scheduleContentFit();
                    return;
                }

                const topBar = document.querySelector('.top-bar');
                const topOffset = topBar ? topBar.offsetHeight + 12 : 0;

                requestAnimationFrame(() => {
                    window.scrollTo({
                        top: Math.max(dynamicContent.offsetTop - topOffset, 0),
                        behavior: 'auto'
                    });
                });
            }

            function clearContentFitState() {
                dynamicContent.classList.remove(
                    'content-fit-applied',
                    'content-has-video',
                    'content-overflowing',
                    'fit-level-0',
                    'fit-level-1',
                    'fit-level-2',
                    'fit-level-3',
                    'fit-level-4',
                    'fit-level-5'
                );
                dynamicContent.removeAttribute('data-fit-level');
                dynamicContent.style.overflowY = '';
                rootElement.style.removeProperty('--main-content-height');
                rootElement.style.removeProperty('--inline-video-max-height');
                rootElement.style.removeProperty('--inline-video-max-width');
                rootElement.style.removeProperty('--content-fit-scale');
            }

            function applyContentFitLevel(level) {
                dynamicContent.classList.remove('fit-level-0', 'fit-level-1', 'fit-level-2', 'fit-level-3', 'fit-level-4', 'fit-level-5', 'content-overflowing');
                dynamicContent.classList.add(`fit-level-${level}`);
                dynamicContent.dataset.fitLevel = String(level);
            }

            function updateInlineVideoSizing(videoShell) {
                if (!videoShell) return;

                const header = videoShell.querySelector('.inline-video-header');
                const footer = videoShell.querySelector('.inline-video-footer');
                const shellStyles = window.getComputedStyle(videoShell);
                const contentStyles = window.getComputedStyle(dynamicContent);
                const shellBorder = parseFloat(shellStyles.borderTopWidth || 0) + parseFloat(shellStyles.borderBottomWidth || 0);
                const headerVisible = header && window.getComputedStyle(header).display !== 'none';
                const footerVisible = footer && window.getComputedStyle(footer).display !== 'none';
                const headerHeight = headerVisible ? header.offsetHeight : 0;
                const footerHeight = footerVisible ? footer.offsetHeight : 0;
                const paddingX = parseFloat(contentStyles.paddingLeft || 0) + parseFloat(contentStyles.paddingRight || 0);
                const paddingY = parseFloat(contentStyles.paddingTop || 0) + parseFloat(contentStyles.paddingBottom || 0);
                const contentBoxHeight = Math.max(220, window.innerHeight - (document.querySelector('.top-bar')?.offsetHeight || 0) - paddingY);
                const availableHeight = Math.max(180, Math.min(dynamicContent.clientHeight, contentBoxHeight) - headerHeight - footerHeight - shellBorder - 8);
                const availableWidth = Math.max(260, dynamicContent.clientWidth - paddingX - 8);
                const videoHeightByWidth = availableWidth * 9 / 16;
                const finalHeight = Math.max(180, Math.min(availableHeight, videoHeightByWidth));
                const finalWidth = Math.min(availableWidth, finalHeight * 16 / 9);

                rootElement.style.setProperty('--inline-video-max-height', `${Math.floor(finalHeight)}px`);
                rootElement.style.setProperty('--inline-video-max-width', `${Math.floor(finalWidth)}px`);
            }

            function autoFitMainContent() {
                const profile = syncDeviceProfile();
                const topBar = document.querySelector('.top-bar');

                if (topBar) {
                    rootElement.style.setProperty('--topbar-height', `${topBar.offsetHeight}px`);
                }

                if (!profile?.wideLayout) {
                    clearContentFitState();
                    return;
                }

                dynamicContent.classList.add('content-fit-applied');
                dynamicContent.style.overflowY = 'hidden';
                rootElement.style.setProperty('--main-content-height', `${dynamicContent.clientHeight}px`);

                const videoShell = dynamicContent.querySelector('.inline-video-shell');
                dynamicContent.classList.toggle('content-has-video', Boolean(videoShell));

                for (let level = 0; level <= 5; level += 1) {
                    applyContentFitLevel(level);
                    updateInlineVideoSizing(videoShell);

                    // Força a atualização do layout antes da medição seguinte.
                    void dynamicContent.offsetHeight;

                    const fitsVertically = dynamicContent.scrollHeight <= dynamicContent.clientHeight + 2;
                    const fitsHorizontally = dynamicContent.scrollWidth <= dynamicContent.clientWidth + 2;

                    if (fitsVertically && fitsHorizontally) {
                        dynamicContent.classList.remove('content-overflowing');
                        return;
                    }
                }

                dynamicContent.classList.add('content-overflowing');
                if (videoShell) {
                    updateInlineVideoSizing(videoShell);
                    void dynamicContent.offsetHeight;
                    if (dynamicContent.scrollHeight > dynamicContent.clientHeight + 2) {
                        rootElement.style.setProperty('--inline-video-max-height', `${Math.max(160, dynamicContent.clientHeight - 8)}px`);
                        rootElement.style.setProperty('--inline-video-max-width', `${Math.max(260, dynamicContent.clientWidth - 8)}px`);
                    }
                }
            }

            let contentFitFrame = null;
            function scheduleContentFit() {
                window.cancelAnimationFrame(contentFitFrame);
                contentFitFrame = window.requestAnimationFrame(() => {
                    autoFitMainContent();
                });
            }

            function buildPhaseToolbarHTML(phase) {
                return `
                    <section class="phase-toolbar">
                        <div class="phase-jump-list">
                            ${phase.cards.map(card => `
                                <button class="phase-chip" type="button" data-target="${card.id}" aria-label="Ir para ${escapeHTML(card.title)}">
