                                    <span>${escapeHTML(card.title)}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="phase-controls">
                            <button class="control-btn" type="button" data-action="expand">
                                <i class="fa-solid fa-square-plus"></i>
                                <span>Expandir tudo</span>
                            </button>
                            <button class="control-btn" type="button" data-action="collapse">
                                <i class="fa-solid fa-compress"></i>
                                <span>Compactar</span>
                            </button>
                        </div>
                    </section>
                `;
            }

            // --- Gerenciador de Tema (Forçando Claro por Padrão) ---
            const savedTheme = localStorage.getItem('app-theme') || 'light';
            rootElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = rootElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                
                rootElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('app-theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function updateThemeIcon(theme) {
                if(theme === 'dark') {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
            }

            // --- Controle do Menu Sanduíche Mobile ---
            mobileMenuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('open');
                const icon = mobileMenuBtn.querySelector('i');
                if(navMenu.classList.contains('open')){
                    icon.classList.replace('fa-bars', 'fa-times');
                } else {
                    icon.classList.replace('fa-times', 'fa-bars');
                }
            });

            function closeMobileMenu() {
                if(window.innerWidth <= 768 && navMenu.classList.contains('open')) {
                    navMenu.classList.remove('open');
                    mobileMenuBtn.querySelector('i').classList.replace('fa-times', 'fa-bars');
                }
            }

            // --- Tela de Boas Vindas (Estado Inicial) ---
            function renderWelcome() {
                const isMobile = window.innerWidth <= 768;
                const instrucaoTexto = isMobile 
                    ? "Selecione uma etapa no menu superior ou use a busca para encontrar aulas rapidamente."
                    : "Escolha uma fase no painel lateral ou use a busca global para localizar qualquer aula em segundos.";

                updateStatusPill(getDeviceStatusText());
                dynamicContent.innerHTML = `
                    <div class="phase-hero welcome-hero">
                        <i class="fa-solid fa-satellite-dish welcome-icon"></i>
                        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; text-shadow: var(--glow-text);">Aprendizado mais rápido e intuitivo</h2>
                        <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 720px;">
                            ${instrucaoTexto}
                        </p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-layer-group', value: platformStats.phases, label: 'Fases disponíveis' },
                        { icon: 'fa-cubes-stacked', value: platformStats.cards, label: 'Trilhas organizadas' },
                        { icon: 'fa-circle-play', value: platformStats.lessons, label: 'Aulas prontas' }
                    ])}
                    ${buildRecentLessonsHTML()}
                `;
            }

            function findVideoContextBySrc(src) {
                for (let phaseIndex = 0; phaseIndex < PHASES.length; phaseIndex++) {
                    const phase = PHASES[phaseIndex];
                    for (const card of phase.cards) {
                        const videoIndex = card.videos.findIndex(video => video.src === src);
                        if (videoIndex !== -1) {
                            return {
                                phaseIndex,
                                phase,
                                card,
                                video: card.videos[videoIndex],
                                videoIndex
                            };
                        }
                    }
                }
                return null;
            }

            function clearSidebarTopics() {
                document.querySelectorAll('.nav-phase-block').forEach(block => block.classList.remove('expanded'));
                document.querySelectorAll('.nav-topic-tree').forEach(tree => {
                    tree.innerHTML = '';
                    tree.setAttribute('aria-hidden', 'true');
                });
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            }

            function buildSidebarTopicsHTML(phase, phaseIndex, selectedCardId = null) {
                return phase.cards.map((card, cardIndex) => {
                    const isSelected = selectedCardId === card.id;
                    const cardSummary = getCardSummary(card);

                    const lessonsHTML = card.videos.map((video, videoIndex) => {
                        const safeVideoTitle = escapeHTML(video.title);
                        const isActiveVideo = activeVideoSrc === video.src;
                        return `
                            <button class="sidebar-lesson-item ${isActiveVideo ? 'active' : ''}" type="button" data-phase-index="${phaseIndex}" data-card-id="${card.id}" data-src="${video.src}" data-title="${safeVideoTitle}" aria-label="Assistir ${safeVideoTitle}">
                                <span class="sidebar-lesson-index">${String(videoIndex + 1).padStart(2, '0')}</span>
                                <span>
                                    <span class="nav-type-label video">Vídeo</span>
                                    <span class="sidebar-lesson-title">${safeVideoTitle}</span>
                                    <span class="sidebar-lesson-meta"><i class="fa-solid fa-chart-simple"></i> ${escapeHTML(video.views || '')}</span>
                                </span>
                            </button>
                        `;
                    }).join('');

                    return `
                        <div class="nav-topic-block">
                            <button class="nav-topic-btn ${isSelected ? 'active' : ''}" type="button" data-phase-index="${phaseIndex}" data-card-id="${card.id}" aria-expanded="${isSelected ? 'true' : 'false'}" aria-label="Abrir tópico ${escapeHTML(card.title)}">
                                <span class="topic-number">${String(cardIndex + 1).padStart(2, '0')}</span>
                                <span class="nav-phase-main"><span class="nav-type-label topic">Tópico</span><span class="nav-label-title">${escapeHTML(card.title)}</span></span>
                                <i class="fa-solid ${isSelected ? 'fa-chevron-down' : 'fa-chevron-right'}"></i>
                            </button>
                            ${isSelected ? `
                                <div class="nav-topic-panel" aria-label="Aulas disponíveis neste tópico">
                                    <div class="sidebar-lesson-list">
                                        ${lessonsHTML}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            }

            function renderSidebarPhaseTopics(phaseIndex, selectedCardId = null) {
                const phase = PHASES[phaseIndex];

                document.querySelectorAll('.nav-phase-block').forEach((block, index) => {
                    const navItem = block.querySelector('.nav-item');
                    const tree = block.querySelector('.nav-topic-tree');
                    const isActive = index === phaseIndex;

                    block.classList.toggle('expanded', isActive && isWideLayout());
                    if (navItem) navItem.classList.toggle('active', isActive);

                    if (tree) {
                        if (isActive && isWideLayout()) {
                            tree.innerHTML = buildSidebarTopicsHTML(phase, phaseIndex, selectedCardId);
                            tree.setAttribute('aria-hidden', 'false');
                        } else {
                            tree.innerHTML = '';
                            tree.setAttribute('aria-hidden', 'true');
                        }
                    }
                });
            }

            function renderWidePhaseIntro(phase) {
                const summary = getPhaseSummary(phase);
                updateStatusPill(`${summary.cards} tópicos no menu lateral`);
                dynamicContent.innerHTML = `
                    <div class="phase-hero">
                        <span class="phase-badge"><i class="fa-solid fa-layer-group"></i> FASE ${phase.number}</span>
                        <h2>${escapeHTML(phase.title)}</h2>
                        <p>${escapeHTML(phase.description)}</p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-cubes', value: summary.cards, label: 'Tópicos no menu lateral' },
                        { icon: 'fa-circle-play', value: summary.lessons, label: 'Aulas disponíveis' }
                    ])}
                    <section class="desktop-empty-state">
                        <i class="fa-solid fa-diagram-project"></i>
                        <h3>Escolha um tópico no menu lateral</h3>
                        <p>Os tópicos desta fase agora aparecem logo abaixo da fase selecionada. Ao abrir um tópico, as aulas ficam abaixo dele; ao escolher uma aula, o vídeo será exibido nesta área central.</p>
                    </section>
                `;
            }

            function renderWideTopicPrompt(phase, card) {
                const cardSummary = getCardSummary(card);
                updateStatusPill(`${cardSummary.lessons} aulas no tópico selecionado`);
                dynamicContent.innerHTML = `
                    <div class="phase-hero">
                        <span class="phase-badge"><i class="fa-solid ${phase.icon}"></i> ${escapeHTML(phase.title)}</span>
                        <h2>${escapeHTML(card.title)}</h2>
                        <p>${escapeHTML(card.desc)}</p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-circle-play', value: cardSummary.lessons, label: 'Aulas neste tópico' }
                    ])}
                    <section class="desktop-empty-state">
                        <i class="fa-solid fa-list-check"></i>
                        <h3>Explicação exibida na área central</h3>
                        <p>As informações da trilha ficam nesta área. No menu lateral permanecem apenas a hierarquia de fases, tópicos e vídeos.</p>
                    </section>
                `;
            }

            function openVideoInContent(src, title) {
                const context = findVideoContextBySrc(src);
                const safeTitle = escapeHTML(title || context?.video?.title || 'Aula selecionada');
                const safePhaseTitle = context ? escapeHTML(context.phase.title) : 'Aula';
                const safeCardTitle = context ? escapeHTML(context.card.title) : 'Conteúdo selecionado';

                if (context) {
                    activePhaseIndex = context.phaseIndex;
                    activeCardId = context.card.id;
                    renderSidebarPhaseTopics(activePhaseIndex, activeCardId);
                }

                activeVideoSrc = src;

                if (modal.classList.contains('active')) {
                    closeModal();
                }

                dynamicContent.innerHTML = `
                    <section class="inline-video-shell">
                        <div class="inline-video-header">
                            <div>
                                <span class="inline-video-kicker"><i class="fa-solid fa-circle-play"></i> Aula selecionada</span>
                                <h2>${safeTitle}</h2>
                                <p class="inline-video-subtitle">${safePhaseTitle} · ${safeCardTitle}</p>
                            </div>
                            <span class="meta-chip"><i class="fa-solid fa-display"></i> Reprodução central</span>
                        </div>
                        <div class="inline-video-wrapper">
                            <iframe src="${src}" title="${safeTitle}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="inline-video-footer">
                            <span><i class="fa-solid fa-circle-info"></i> O vídeo agora abre fora do modal em telas maiores.</span>
                            <span><i class="fa-solid fa-bars-staggered"></i> Continue escolhendo aulas pelo menu lateral.</span>
                        </div>
                    </section>
                `;

                saveRecentLesson({ src, title: title || context?.video?.title || 'Aula selecionada' });
                updateStatusPill('Aula em reprodução');
                resetContentScroll();
            }

            // --- Navegação Lateral / Mobile ---
            function initNav() {
                navMenu.innerHTML = '';
                navMenu.insertAdjacentHTML('beforeend', `
                    <div class="sidebar-legend" aria-label="Legenda visual do menu lateral">
                        <div class="sidebar-legend-title"><i class="fa-solid fa-palette"></i> Legenda do menu</div>
                        <div class="sidebar-legend-row"><span class="legend-dot phase"></span> Fase de estudo</div>
                        <div class="sidebar-legend-row"><span class="legend-dot topic"></span> Tópico da fase</div>
                        <div class="sidebar-legend-row"><span class="legend-dot video"></span> Conteúdo em vídeo</div>
                    </div>
                `);

                PHASES.forEach((phase, index) => {
                    const phaseBlock = document.createElement('div');
                    phaseBlock.className = 'nav-phase-block';
                    phaseBlock.setAttribute('data-phase-index', index);

                    const navItem = document.createElement('div');
                    navItem.className = 'nav-item';
                    navItem.setAttribute('role', 'button');
                    navItem.setAttribute('tabindex', '0');
                    navItem.innerHTML = `<i class="fa-solid ${phase.icon}"></i> <span class="nav-phase-main"><span class="nav-type-label phase">Fase</span><span class="nav-label-title">${escapeHTML(phase.title)}</span></span>`;

                    const topicTree = document.createElement('div');
                    topicTree.className = 'nav-topic-tree';
                    topicTree.setAttribute('aria-hidden', 'true');

                    navItem.addEventListener('click', () => {
                        const hadSearch = searchInput.value.trim() !== '';
                        const samePhase = activePhaseIndex === index;
                        const phaseIsExpanded = phaseBlock.classList.contains('expanded');
                        searchInput.value = '';

                        if (isWideLayout()) {
                            if (samePhase && !hadSearch) {
                                if (phaseIsExpanded) {
                                    phaseBlock.classList.remove('expanded');
                                    const tree = phaseBlock.querySelector('.nav-topic-tree');
                                    if (tree) {
                                        tree.innerHTML = '';
                                        tree.setAttribute('aria-hidden', 'true');
                                    }
                                } else {
                                    renderSidebarPhaseTopics(index, activeCardId);
                                }
                                updateStatusPill(`${getPhaseSummary(PHASES[index]).lessons} aulas nesta fase`);
                                resetContentScroll();
                                return;
                            }

                            activePhaseIndex = index;
                            activeCardId = null;
                            activeVideoSrc = null;
                            renderSidebarPhaseTopics(index);
                            renderWidePhaseIntro(PHASES[index]);
                            resetContentScroll();
                            return;
                        }

                        if (samePhase && !hadSearch) {
                            activePhaseIndex = null;
                            activeCardId = null;
                            activeVideoSrc = null;
                            closeMobileMenu();
                            clearSidebarTopics();
                            renderWelcome();
                            updateStatusPill(getDeviceStatusText());
                            resetContentScroll();
                            return;
                        }

                        activePhaseIndex = index;
                        activeCardId = null;
                        activeVideoSrc = null;
                        closeMobileMenu();
                        clearSidebarTopics();
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        navItem.classList.add('active');
                        renderPhase(PHASES[activePhaseIndex]);
                        resetContentScroll();
                    });

                    navItem.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            navItem.click();
                        }
                    });

                    phaseBlock.appendChild(navItem);
                    phaseBlock.appendChild(topicTree);
                    navMenu.appendChild(phaseBlock);
                });
            }

            // --- Construtor de Módulos (Cards) ---
            function buildCardsHTML(phase, cardsArray, options = {}) {
                const { collapsible = false, expandFirst = false, showPhaseContext = false, highlightQuery = '' } = options;
                let cardsHTML = '';

                cardsArray.forEach((card, index) => {
                    const cardSummary = getCardSummary(card);
                    const isCollapsed = collapsible ? !(expandFirst && index === 0) : false;
                    let lessonsHTML = '';

                    card.videos.forEach((video, videoIndex) => {
                        const safeTitleText = escapeHTML(video.title);
                        const highlightedVideoTitle = highlightMatches(video.title, highlightQuery);
                        lessonsHTML += `
                            <li class="lesson-item" tabindex="0" role="button" aria-label="Abrir aula ${safeTitleText}" data-src="${video.src}" data-title="${safeTitleText}">
                                <span class="lesson-index">${String(videoIndex + 1).padStart(2, '0')}</span>
                                <i class="fa-solid fa-play play-icon"></i>
                                <div class="lesson-content">
                                    <span class="lesson-title">${highlightedVideoTitle}</span>
                                    <div class="lesson-meta">
                                        <span><i class="fa-solid fa-chart-simple"></i> ${video.views}</span>
                                    </div>
                                </div>
                                <span class="lesson-cta">Assistir</span>
                            </li>
                        `;
                    });

                    let contextHTML = phase && showPhaseContext ? `<span class="module-context">${highlightMatches(phase.title, highlightQuery)}</span>` : '';

                    cardsHTML += `
                        <article class="module-card ${isCollapsed ? 'collapsed' : ''}" id="${card.id}">
                            <div class="module-header">
                                ${contextHTML}
                                <div class="module-header-top">
                                    <div class="icon-box">
                                        <i class="fa-solid ${card.icon}"></i>
                                    </div>
                                    <h3 class="module-title">${highlightMatches(card.title, highlightQuery)}</h3>
                                </div>
                                <p class="module-desc">${highlightMatches(card.desc, highlightQuery)}</p>
                                <div class="module-meta-row">
                                    <span class="meta-chip"><i class="fa-solid fa-circle-play"></i> ${cardSummary.lessons} aulas</span>
                                </div>
                                <button class="module-toggle" type="button" aria-expanded="${isCollapsed ? 'false' : 'true'}">
                                    <span class="toggle-label">${isCollapsed ? 'Toque para exibir aulas' : 'Ocultar aulas'}</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </button>
                            </div>
                            <div class="module-body">
                                <ul class="lesson-list">
                                    ${lessonsHTML}
                                </ul>
                            </div>
                        </article>
                    `;
                });
                return cardsHTML;
            }

            function renderPhase(phase) {
                const summary = getPhaseSummary(phase);
                updateStatusPill(`${summary.lessons} aulas nesta fase`);

                dynamicContent.innerHTML = `
                    <div class="phase-hero">
                        <span class="phase-badge"><i class="fa-solid fa-server"></i> MÓDULO ${phase.number}</span>
                        <h2>${phase.title}</h2>
                        <p>${phase.description}</p>
                    </div>
                    ${buildStatsHTML([
                        { icon: 'fa-cubes', value: summary.cards, label: 'Trilhas nesta fase' },
                        { icon: 'fa-circle-play', value: summary.lessons, label: 'Aulas disponíveis' }
                    ])}
                    ${buildPhaseToolbarHTML(phase)}
                    <div class="modules-grid phase-view-grid">
                        ${buildCardsHTML(phase, phase.cards, { collapsible: true, expandFirst: false, showPhaseContext: false })}
                    </div>
                `;
            }

            createSearchSuggestions();

            // --- Algoritmo de Varredura (Busca) ---
            searchInput.addEventListener('input', (e) => {
                const rawQuery = e.target.value.trim();
                const tokens = getSearchTokens(rawQuery);
                const safeQuery = escapeHTML(rawQuery);

                if (!tokens.length) {
                    if(activePhaseIndex !== null) {
                        if (isWideLayout()) {
                            renderSidebarPhaseTopics(activePhaseIndex, activeCardId);
                            renderWidePhaseIntro(PHASES[activePhaseIndex]);
                        } else {
                            renderPhase(PHASES[activePhaseIndex]);
                            const items = document.querySelectorAll('.nav-item');
                            if(items[activePhaseIndex]) items[activePhaseIndex].classList.add('active');
                        }
                    } else {
                        renderWelcome();
                    }
                    updateStatusPill(activePhaseIndex !== null ? `${getPhaseSummary(PHASES[activePhaseIndex]).lessons} aulas nesta fase` : getDeviceStatusText());
                    return;
                }

                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                if (isWideLayout()) {
                    document.querySelectorAll('.nav-phase-block').forEach(block => block.classList.remove('expanded'));
                    document.querySelectorAll('.nav-topic-tree').forEach(tree => tree.setAttribute('aria-hidden', 'true'));
                }

                let totalLessonsFound = 0;
                let totalCardsFound = 0;
                const rankedResults = [];

                PHASES.forEach(phase => {
                    const phaseSearchText = normalizeText(`${phase.title} ${phase.description}`);
                    const phaseMatched = tokens.every(token => phaseSearchText.includes(token));

                    phase.cards.forEach(card => {
                        const cardSearchText = normalizeText(`${phase.title} ${phase.description} ${card.title} ${card.desc}`);
                        const cardMatched = phaseMatched || tokens.every(token => cardSearchText.includes(token));

                        let matchedVideos = card.videos.filter(video => {
                            const videoSearchText = normalizeText(`${phase.title} ${phase.description} ${card.title} ${card.desc} ${video.title}`);
                            return tokens.every(token => videoSearchText.includes(token));
                        });

                        if (cardMatched && !matchedVideos.length) {
                            matchedVideos = [...card.videos];
                        }

                        if (matchedVideos.length > 0) {
                            totalLessonsFound += matchedVideos.length;
                            totalCardsFound += 1;

                            rankedResults.push({
                                score: scoreMatch(tokens, {
                                    phaseTitle: phase.title,
                                    phaseDescription: phase.description,
                                    cardTitle: card.title,
                                    cardDescription: card.desc,
                                    videoTitles: matchedVideos.map(video => video.title).join(' ')
                                }) + matchedVideos.length,
                                html: buildCardsHTML(phase, [{ ...card, videos: matchedVideos }], {
                                    collapsible: false,
                                    showPhaseContext: true,
                                    highlightQuery: rawQuery
                                })
                            });
                        }
                    });
                });

                const resultsHTML = rankedResults
                    .sort((a, b) => b.score - a.score)
                    .map(result => result.html)
                    .join('');

                if (totalLessonsFound === 0) {
                    updateStatusPill('Nenhum resultado encontrado');
                    dynamicContent.innerHTML = `
                        <div class="no-results">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <h3>Sem resultados</h3>
                            <p>Não encontramos aulas relacionadas a <strong>"${safeQuery}"</strong>. Tente buscar por módulo, tema ou nome da aula.</p>
                        </div>
                    `;
                } else {
                    updateStatusPill(`${totalLessonsFound} resultado(s) inteligentes`);
                    dynamicContent.innerHTML = `
                        <div class="phase-hero" style="border-left-color: var(--secondary-color);">
                            <span class="phase-badge" style="color: var(--secondary-color);"><i class="fa-solid fa-radar"></i> BUSCA ATIVA</span>
                            <h2>Resultados encontrados</h2>
                            <p>${totalLessonsFound} aula(s) correspondem à busca por <strong>"${safeQuery}"</strong>.</p>
                        </div>
                        ${buildStatsHTML([
                            { icon: 'fa-circle-play', value: totalLessonsFound, label: 'Aulas encontradas' },
                            { icon: 'fa-cubes', value: totalCardsFound, label: 'Trilhas relacionadas' }
                        ])}
                        <div class="modules-grid">
                            ${resultsHTML}
                        </div>
                    `;
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const firstResult = dynamicContent.querySelector('.lesson-item, .resume-card');
                    if (firstResult) {
                        e.preventDefault();
                        firstResult.click();
                    }
                }

                if (e.key === 'Escape' && searchInput.value.trim()) {
                    searchInput.value = '';
                    searchInput.dispatchEvent(new Event('input'));
                }
            });

            document.addEventListener('keydown', (e) => {
                const activeTag = document.activeElement?.tagName;
                const isEditable = activeTag === 'INPUT' || activeTag === 'TEXTAREA';

                if (e.key === '/' && !isEditable) {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
            });

            // --- Controle Dinâmico do Modal (Iframe) ---
            const openModal = (src, title) => {
                activeVideoSrc = src;
                modalTitle.textContent = title;
                videoWrapper.innerHTML = `<iframe src="${src}" title="${escapeHTML(title)}" frameborder="0" allowfullscreen></iframe>`;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                saveRecentLesson({ src, title });
                updateStatusPill('Aula em reprodução');
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => { videoWrapper.innerHTML = ''; }, 300);
            };

            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
                searchInput.focus();
            });

            navMenu.addEventListener('click', (e) => {
                if (!isWideLayout()) return;

                const topicBtn = e.target.closest('.nav-topic-btn');
                if (topicBtn) {
                    e.preventDefault();
                    const phaseIndex = Number(topicBtn.getAttribute('data-phase-index'));
                    const cardId = topicBtn.getAttribute('data-card-id');
                    const phase = PHASES[phaseIndex];
                    const card = phase?.cards.find(item => item.id === cardId);
                    const sameOpenTopic = activePhaseIndex === phaseIndex && activeCardId === cardId && topicBtn.getAttribute('aria-expanded') === 'true';

                    if (!phase || !card) return;

                    activePhaseIndex = phaseIndex;

                    if (sameOpenTopic) {
                        activeCardId = null;
                        activeVideoSrc = null;
                        renderSidebarPhaseTopics(phaseIndex, null);
                        renderWidePhaseIntro(phase);
                        resetContentScroll();
                        return;
                    }

                    activeCardId = cardId;
                    activeVideoSrc = null;
                    renderSidebarPhaseTopics(phaseIndex, cardId);
                    renderWideTopicPrompt(phase, card);
                    resetContentScroll();
                    return;
                }

                const sidebarLesson = e.target.closest('.sidebar-lesson-item');
                if (sidebarLesson) {
                    e.preventDefault();
                    const phaseIndex = Number(sidebarLesson.getAttribute('data-phase-index'));
                    const cardId = sidebarLesson.getAttribute('data-card-id');
                    const src = sidebarLesson.getAttribute('data-src');
                    const title = sidebarLesson.getAttribute('data-title');

                    activePhaseIndex = phaseIndex;
                    activeCardId = cardId;
                    activeVideoSrc = src;
                    renderSidebarPhaseTopics(phaseIndex, cardId);
                    openVideoInContent(src, title);
                }
            });

            navMenu.addEventListener('keydown', (e) => {
                const actionable = e.target.closest('.nav-topic-btn, .sidebar-lesson-item');
                if (actionable && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    actionable.click();
                }
            });

            dynamicContent.addEventListener('click', (e) => {
                const actionItem = e.target.closest('.lesson-item, .resume-card');
                if (actionItem) {
                    const src = actionItem.getAttribute('data-src');
                    const title = actionItem.getAttribute('data-title');
                    if (isWideLayout()) {
                        openVideoInContent(src, title);
                    } else {
                        openModal(src, title);
                    }
                    return;
                }

                const toggleBtn = e.target.closest('.module-toggle');
                if (toggleBtn) {
                    const card = toggleBtn.closest('.module-card');
                    const isCollapsed = card.classList.toggle('collapsed');
                    toggleBtn.setAttribute('aria-expanded', String(!isCollapsed));
                    const label = toggleBtn.querySelector('.toggle-label');
                    if (label) label.textContent = isCollapsed ? 'Toque para exibir aulas' : 'Ocultar aulas';
                    return;
                }

                const phaseChip = e.target.closest('.phase-chip');
                if (phaseChip) {
                    const targetCard = document.getElementById(phaseChip.getAttribute('data-target'));
                    if (targetCard) {
                        targetCard.classList.remove('collapsed');
                        const toggle = targetCard.querySelector('.module-toggle');
                        if (toggle) {
                            toggle.setAttribute('aria-expanded', 'true');
                            const label = toggle.querySelector('.toggle-label');
                            if (label) label.textContent = 'Ocultar aulas';
                        }
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    return;
                }

                const controlBtn = e.target.closest('.control-btn');
                if (controlBtn) {
                    const collapseAll = controlBtn.getAttribute('data-action') === 'collapse';
                    document.querySelectorAll('.phase-view-grid .module-card').forEach(card => {
                        card.classList.toggle('collapsed', collapseAll);
                        const toggle = card.querySelector('.module-toggle');
                        if (toggle) {
                            toggle.setAttribute('aria-expanded', String(!collapseAll));
                            const label = toggle.querySelector('.toggle-label');
                            if (label) label.textContent = collapseAll ? 'Toque para exibir aulas' : 'Ocultar aulas';
                        }
                    });
                }
            });

            dynamicContent.addEventListener('keydown', (e) => {
                if ((e.key === 'Enter' || e.key === ' ') && e.target.closest('.lesson-item, .resume-card')) {
                    e.preventDefault();
                    e.target.closest('.lesson-item, .resume-card').click();
                }
            });

            closeModalBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            window.addEventListener('scroll', () => {
                scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
            });

            document.addEventListener('keydown', (e) => {
                const typingInField = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);

                if ((e.key === '/' || (e.ctrlKey && e.key.toLowerCase() === 'k')) && !typingInField) {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                    return;
                }

                if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
            });

            let previousWideLayout = isWideLayout();
            window.addEventListener('resize', () => {
                const currentProfile = syncDeviceProfile();
                const currentWideLayout = Boolean(currentProfile?.wideLayout);

                if (currentWideLayout === previousWideLayout) {
                    scheduleContentFit();
                    return;
                }

                previousWideLayout = currentWideLayout;

                if (activePhaseIndex === null) {
                    clearSidebarTopics();
                    renderWelcome();
                    scheduleContentFit();
                    return;
                }

                if (currentWideLayout) {
                    if (activeVideoSrc) {
                        openVideoInContent(activeVideoSrc, findVideoContextBySrc(activeVideoSrc)?.video?.title || 'Aula selecionada');
                    } else {
                        renderSidebarPhaseTopics(activePhaseIndex, activeCardId);
                        renderWidePhaseIntro(PHASES[activePhaseIndex]);
                    }
                } else {
                    clearSidebarTopics();
                    renderPhase(PHASES[activePhaseIndex]);
                    const items = document.querySelectorAll('.nav-item');
                    if(items[activePhaseIndex]) items[activePhaseIndex].classList.add('active');
                }

                scheduleContentFit();
            });

            document.addEventListener('adaptive-profile-change', () => {
                syncDeviceProfile();
                scheduleContentFit();
            });

            const contentMutationObserver = new MutationObserver(() => {
                scheduleContentFit();
            });

            contentMutationObserver.observe(dynamicContent, {
                childList: true,
                subtree: false
            });

            if (window.ResizeObserver) {
                const fitResizeObserver = new ResizeObserver(() => scheduleContentFit());
                fitResizeObserver.observe(dynamicContent);
                fitResizeObserver.observe(document.querySelector('.top-bar'));
            }

            // --- Boot Sequence (Inicializa Interface e carrega o Vazio) ---
            syncDeviceProfile();
            initNav();
            renderWelcome();
            scheduleContentFit();
        });
    </script>
</body>
</html>
